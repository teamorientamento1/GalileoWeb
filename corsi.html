<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Trova il tuo corso – UniPi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --radius: 16px; --gap: 10px; --transition: 0.32s cubic-bezier(0.4,0,0.2,1); }
  html, body { height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117; color: #fff; }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: #0f1117;                   /* opaco: non si vede attraverso */
    transform: translateX(100%);
    transition: transform var(--transition);
    will-change: transform;
    z-index: 0; pointer-events: none;
  }
  .screen.active      { transform: translateX(0);    z-index: 2; pointer-events: all; }
  .screen.exit-left   { transform: translateX(-28%); z-index: 1; pointer-events: none; }
  .screen.going-right { transform: translateX(100%); z-index: 2; pointer-events: none; }
  .screen.behind      { transform: translateX(0);    z-index: 1; pointer-events: none; }

  /* ── EXPAND OVERLAY (morph dal riquadro) ── */
  #expand-overlay {
    position: fixed; z-index: 90;
    background: #000;
    border-radius: var(--radius);
    pointer-events: none;
    opacity: 0;
    /* posizione e dimensione impostate via JS */
  }
  #expand-overlay.expanding {
    pointer-events: all;
    opacity: 1;
    transition: left   0.42s cubic-bezier(0.4,0,0.2,1),
                top    0.42s cubic-bezier(0.4,0,0.2,1),
                width  0.42s cubic-bezier(0.4,0,0.2,1),
                height 0.42s cubic-bezier(0.4,0,0.2,1),
                border-radius 0.42s cubic-bezier(0.4,0,0.2,1),
                opacity 0.15s ease;
  }

  /* ── VIDEO (dentro l'overlay espanso) ── */
  #expand-overlay video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #expand-overlay video.visible { opacity: 1; }

  /* HOME HEADER */
  .home-header { padding: 16px 16px 8px; flex-shrink: 0; }
  .home-header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .home-header p  { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 3px; }

  /* GRID */
  .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr;
    gap: var(--gap); padding: var(--gap);
    padding-bottom: calc(var(--gap) + env(safe-area-inset-bottom)); overflow: hidden; }

  .area-card {
    border-radius: var(--radius); overflow: hidden; position: relative;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    background: var(--card-color);
  }

  .card-logo {
    display: block; width: 100%; height: 100%;
    object-fit: cover; aspect-ratio: 9/14;
  }

  .area-card::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0;
    height: 40%;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.6));
    pointer-events: none;
  }

  .card-label {
    position: absolute; bottom: 10px; left: 0; right: 0;
    z-index: 1; font-size: 10px; font-weight: 700;
    text-align: center; color: #fff; line-height: 1.3;
    padding: 0 6px; text-transform: uppercase; letter-spacing: 0.4px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* TOPBAR */
  .topbar { flex-shrink: 0; height: 52px; display: flex; align-items: center;
    padding: 0 10px; gap: 8px;
    background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.07); }
  .btn-back { background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 20px; line-height: 1;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .btn-back:active { opacity: 0.6; }
  .topbar-title { font-size: 15px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* HERO */
  .hero { flex-shrink: 0; position: relative; height: 200px; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; transition: background 0.3s; }
  .hero img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  .hero::after { content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, #0f1117 100%);
    pointer-events: none; }
  .hero .hero-topbar { position: absolute; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; padding: 0 10px; z-index: 5;
    background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 100%); }

  /* PANEL */
  .panel { flex: 1; overflow-y: auto; padding: 12px 16px 40px;
    -webkit-overflow-scrolling: touch; }
  .panel::-webkit-scrollbar { display: none; }

  .area-title    { font-size: 21px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 4px; }
  .area-subtitle { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 18px; }

  /* LEVEL BUTTONS */
  .level-btn { display: flex; align-items: center; gap: 13px; width: 100%;
    margin-bottom: 10px; padding: 14px 16px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px; cursor: pointer; color: #fff; text-align: left;
    -webkit-tap-highlight-color: transparent; transition: background 0.13s; }
  .level-btn:active { background: rgba(255,255,255,0.13); }
  .lv-icon  { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .lv-text  { flex: 1; }
  .lv-name  { font-size: 15px; font-weight: 700; }
  .lv-count { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .lv-arrow { font-size: 16px; color: rgba(255,255,255,0.28); }

  /* COURSE LIST */
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; color: rgba(255,255,255,0.35); margin: 18px 0 10px; }

  .course-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, transform 0.1s;
  }
  .course-card:active { background: rgba(255,255,255,0.12); transform: scale(0.98); }

  .cc-accent {
    width: 4px; min-height: 44px; border-radius: 4px;
    flex-shrink: 0; align-self: stretch;
  }
  .cc-body { flex: 1; min-width: 0; }
  .cc-name {
    font-size: 15px; font-weight: 700; line-height: 1.35;
    color: #fff; margin-bottom: 6px;
  }
  .cc-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .cc-chip {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
  }
  .cc-chip.accent { color: var(--chip-color); background: var(--chip-bg); }
  .cc-arrow { font-size: 18px; color: rgba(255,255,255,0.2); flex-shrink: 0; }

  /* COURSE DETAIL */
  .cd-title { font-size: 20px; font-weight: 800; line-height: 1.3; letter-spacing: -0.3px; margin-bottom: 8px; }
  .cd-badge { display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 20px;
    text-transform: uppercase; letter-spacing: 0.5px; }
  .cd-desc  { font-size: 14px; line-height: 1.75; color: rgba(255,255,255,0.72); white-space: pre-line; }
  .btn-link { display: block; width: 100%; margin-top: 26px; padding: 15px;
    border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
    text-align: center; text-decoration: none; color: #fff; cursor: pointer;
    -webkit-tap-highlight-color: transparent; }
  .btn-link:active { opacity: 0.8; }
</style>
</head>
<body>

<!-- EXPAND + VIDEO OVERLAY -->
<div id="expand-overlay">
  <video id="exp-video" playsinline muted preload="auto"></video>
</div>

<!-- S1: HOME -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <h1>Trova il tuo corso</h1>
    <p>Scegli un'area per scoprire i corsi di laurea</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- S2: AREA (livelli) -->
<div class="screen" id="screen-detail">
  <div class="hero" id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <img id="hero-img" src="" alt="">
    <div class="hero-topbar">
      <button class="btn-back" onclick="goBack('screen-detail','screen-home')">‹</button>
    </div>
  </div>
  <div class="panel">
    <div class="area-title"    id="detail-title"></div>
    <div class="area-subtitle" id="detail-sub"></div>
    <div id="level-btns"></div>
  </div>
</div>

<!-- S3: COURSE LIST -->
<div class="screen" id="screen-courses">
  <div class="topbar">
    <button class="btn-back" onclick="goBack('screen-courses','screen-detail')">‹</button>
    <span class="topbar-title" id="courses-title"></span>
  </div>
  <div class="panel" id="courses-list"></div>
</div>

<!-- S4: COURSE DETAIL -->
<div class="screen" id="screen-course">
  <div class="topbar">
    <button class="btn-back" onclick="goBack('screen-course','screen-courses')">‹</button>
    <span class="topbar-title" id="course-topbar-title"></span>
  </div>
  <div class="panel" id="course-panel"></div>
</div>

<script>
const DATA = {"aree": [{"id": "agraria", "nome": "Agraria e Veterinaria", "colore": "#49af46", "colore_testo": "#ffffff", "logo_statico": "assets/loghi/agraria.png", "logo_video": "assets/video/unipi_verde.mp4", "corsi": [{"nome": "Medicina Veterinaria (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Medicina Veterinaria (5 anni, accesso programmato nazionale)\nIl corso prepara a diventare medico/a veterinario/a, con solide competenze scientifiche, metodologiche e pratiche. Il percorso comprende materie di base (anatomia, biochimica, fisiologia), discipline cliniche (medicina, chirurgia, ostetricia, anestesiologia) e diagnostica. Il titolo di laurea abilita all’esercizio della professione veterinaria.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/medicina-veterinaria-vetr-lm5/#piano-di-studi"}, {"nome": "Biosicurezza e Qualità degli Alimenti", "tipo": "magistrale", "descrizione": "Biosicurezza e Qualità degli Alimenti (2 anni, accesso libero)\nLa laurea magistrale prepara professionisti in grado di garantire la sicurezza e la qualità degli alimenti lungo tutta la filiera. Il percorso sviluppa competenze in biotecnologie e tecnologie alimentari, qualità e sicurezza degli alimenti, sostenibilità e normativa, con attenzione alla comunicazione. Il corso è strutturato su due anni: il primo offre una preparazione specialistica su produzioni animali, vegetali e microbiche; il secondo applica queste conoscenze in corsi professionalizzanti. La formazione include laboratori pratici e un tirocinio in laboratori italiani o esteri. ", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biosicurezza-e-qualita-degli-alimenti-wbqr-lm/#piano-di-studi"}, {"nome": "Biotecnologie Vegetali e Microbiche", "tipo": "magistrale", "descrizione": "Biotecnologie Vegetali e Microbiche (2 anni, accesso libero)\nLa laurea magistrale prepara professionisti in grado di progettare e gestire processi biotecnologici per l’agricoltura sostenibile e la protezione ambientale. Il percorso sviluppa competenze su organismi vegetali, microrganismi, fisiologia, biochimica e genetica, applicate al miglioramento delle produzioni agrarie. Il corso si articola in tre aree: biotecnologie per le produzioni agrarie, biotecnologie per la protezione delle piante e dell’ambiente, area etica e giuridica.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biotecnologie-vegetali-e-microbiche-wbvr-lm/#piano-di-studi"}, {"nome": "Progettazione e Gestione del Verde Urbano e del Paesaggio", "tipo": "magistrale", "descrizione": "Progettazione e Gestione del Verde Urbano e del Paesaggio (2 anni, accesso libero)\nLa laurea magistrale prepara professionisti nella progettazione e gestione del verde ornamentale, storico e sportivo in contesti urbani ed extra-urbani. Il percorso comprende discipline come fitogeografia, geobotanica, agronomia ambientale, orticoltura urbana, difesa delle piante, meccanizzazione e sicurezza sul lavoro, manutenzione di spazi verdi sportivi e ricreativi, aspetti storici e architettonici del verde, cartografia e progettazione. Il titolo consente l’accesso all’esame di abilitazione per l’esercizio della professione di Dottore Agronomo.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/progettazione-e-gestione-del-verde-urbano-e-del-paesaggio-wver-lm/#piano-di-studi"}, {"nome": "Sistemi Agricoli Sostenibili", "tipo": "magistrale", "descrizione": "Sistemi Agricoli Sostenibili (2 anni, accesso libero)\nLa laurea magistrale forma professionisti con competenze avanzate in qualità delle produzioni agrarie, agricoltura di precisione, sostenibilità agro-ecologica, innovazioni agro-industriali e bioeconomia. Il percorso comprende insegnamenti comuni su produzioni vegetali e animali, difesa fitosanitaria e gestione rurale, e si articola in cinque curricula: Qualità delle produzioni agrarie, Precision Farming, Agro-ecologia, Sistemi agro-industriali innovativi e Bioeconomics.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/sistemi-agricoli-sostenibili-wasr-lm/#piano-di-studi"}, {"nome": "Sistemi Zootecnici Sostenibili", "tipo": "magistrale", "descrizione": "Sistemi Zootecnici Sostenibili (2 anni, accesso libero)\nLa laurea magistrale prepara professionisti con competenze avanzate sull’allevamento sostenibile, la gestione delle produzioni animali e la valutazione dei loro impatti ambientali e sociali. Il corso copre tecnologie eco-compatibili, sistemi di allevamento di diverse specie, benessere animale, biosicurezza, qualità e valorizzazione dei prodotti. Il percorso sviluppa capacità di analisi ambientale e socio-territoriale, progettazione di impianti e strutture zootecniche.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/sistemi-zootecnici-sostenibili-wszr-lm/#piano-di-studi"}, {"nome": "Scienze Agrarie", "tipo": "triennale", "descrizione": "Scienze Agrarie (3 anni, accesso libero)\nIl corso offre conoscenze sull’agricoltura e sulle sue interazioni con ambiente, società ed economia. Ci sono due percorsi: uno più scientifico per proseguire con la magistrale e uno più professionale per inserirsi direttamente nel settore. Sono previste attività pratiche in laboratorio e in campo.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-agrarie-agrr-l/#piano-di-studi"}, {"nome": "Scienze degli Alimenti", "tipo": "triennale", "descrizione": "Scienze degli Alimenti (3 anni, accesso libero)\nIl corso prepara a operare nel settore alimentare con competenze tecnico-scientifiche e pratiche. Gli studi coprono tecnologie alimentari, sicurezza, chimica, fisiologia degli alimenti, produzione e commercializzazione. Il percorso prevede un tirocinio pratico in università o aziende del settore. La laurea consente l’accesso all’Esame di Stato per Agronomo e Forestale Junior.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-degli-alimenti-sal-l/#piano-di-studi"}, {"nome": "Scienze e Tecnologie delle Produzioni Animali", "tipo": "triennale", "descrizione": "Scienze e Tecnologie delle Produzioni Animali (3 anni, accesso libero)\nIl corso forma professionisti in grado di gestire la filiera zootecnica, dagli alimenti per animali all’allevamento, all’igiene e alla gestione economica delle aziende. Il percorso include materie scientifiche e tecniche, con attività pratiche sul campo. ", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-e-tecnologie-delle-produzioni-animali-stpr-l/#descrizione"}, {"nome": "Tecniche di Allevamento Animale ed Educazione Cinofila", "tipo": "triennale", "descrizione": "Tecniche di Allevamento Animale ed Educazione Cinofila (3 anni, accesso programmato locale)\nIl corso forma professionisti nel benessere animale, con due curricula: Allevatore ed educatore cinofilo e Tecnico veterinario. Gli studenti acquisiscono competenze in sanità animale, gestione degli allevamenti, alimentazione, genetica, legislazione, benessere, tecniche di laboratorio e educazione comportamentale del cane. Il percorso include materie comuni (anatomia, fisiologia, patologia, etologia, bioetica) e materie specifiche a seconda del curriculum. ", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-di-allevamento-animale-ed-educazione-cinofila-canr-l/#piano-di-studi"}, {"nome": "Viticoltura ed Enologia", "tipo": "triennale", "descrizione": "Viticoltura ed Enologia (3 anni, accesso libero)\nIl corso forma professionisti capaci di operare in tutta la filiera vitivinicola, dalla coltivazione della vite al marketing del vino. La formazione comprende aspetti biologici, tecnologici, economici e di mercato, con lezioni, esercitazioni, visite tecniche e un tirocinio in azienda.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/viticoltura-ed-enologia-vitr-l/#piano-di-studi"}]}, {"id": "umanistiche", "nome": "Discipline Umanistiche", "colore": "#eb0885", "colore_testo": "#ffffff", "logo_statico": "assets/loghi/umanistiche.png", "logo_video": "assets/video/unipi_magenta.mp4", "corsi": [{"nome": "Scienze della Formazione Primaria (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Scienze della Formazione Primaria (5 anni, accesso programmato nazionale)\nLa laurea magistrale forma i futuri insegnanti della scuola primaria, fornendo competenze pedagogiche, psicologiche, antropologiche e didattiche. Il percorso, interdisciplinare, combina lezioni, laboratori e attività pratiche in lingua inglese e tecnologie didattiche, con tirocini a scuola a partire dal secondo anno. Gli studi coprono sia le discipline pedagogiche e psicologiche, sia le materie insegnate nella scuola primaria, con particolare attenzione a integrazione di bambini con bisogni speciali, gestione di contesti multiculturali.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-della-formazione-primaria-sfp-lm5/#piano-di-studi"}, {"nome": "Archeologia", "tipo": "magistrale", "descrizione": "Archeologia (2 anni, accesso libero)\nLa laurea magistrale prepara professionisti per attività operative e di coordinamento nell’archeologia del Mediterraneo, con competenze critico-interpretative, storiche e metodologiche avanzate. Il corso si articola in tre curricula: Pre-protostorico, Classico, Medievale, approfondendo le discipline archeologiche con strumenti informatici e applicazioni archeometriche. La didattica include lezioni teoriche, scavi, ricognizioni (anche subacquee), laboratori di paleopatologia, classificazione reperti, rilievo, chimica, fotografia, elaborazione digitale e archeometria, oltre a tirocini presso musei e centri di ricerca.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/archeologia-warr-lm/#piano-di-studi"}, {"nome": "Comunicazione, Media, Tecnologie", "tipo": "magistrale", "descrizione": "Comunicazione, Media e Tecnologie (2 anni, accesso libero)\nLa laurea magistrale forma professionisti nelle diverse forme di comunicazione, con attenzione ai media visivi e alle nuove tecnologie, inclusa l’intelligenza artificiale. Gli studenti acquisiscono competenze per analizzare bisogni comunicativi, progettare strategie efficaci, creare prodotti comunicativi e condurre ricerche interdisciplinari. Il corso prevede un primo anno comune e un secondo anno articolato in due percorsi: Cinema e Media Visuali, focalizzato su tecnologie multimediali per cinema, arti performative ed elettroniche, e Comunicazione e Nuove Tecnologie, incentrato sulle trasformazioni digitali e sull’impatto dell’AI su informazione, società e politica.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/comunicazione-media-tecnologie-wcm-lm/#piano-di-studi"}, {"nome": "Filologia e Storia dell'Antichità", "tipo": "magistrale", "descrizione": "Filologia e Storia dell’Antichità (2 anni, accesso libero)\nLa laurea magistrale forma professionisti con conoscenze approfondite delle lingue e civiltà greca e romana, dall’età arcaica al tardo antico e bizantino. Il corso si articola in due percorsi: filologico-letterario e storico, sviluppando padronanza dei metodi delle Scienze dell’Antichità, capacità di analisi critica di testi e documenti greci e latini, e uso degli strumenti informatici. La didattica comprende tirocini presso scuole, enti pubblici e privati, favorendo contatti con il mondo della ricerca e del lavoro. Le discipline studiate includono letterature greca e romana, storia.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/filologia-e-storia-dell-antichita-wsa-lm/#piano-di-studi"}, {"nome": "Filosofia e Forme del Sapere", "tipo": "magistrale", "descrizione": "Filosofia e Forme del Sapere (2 anni, accesso libero)\nLa laurea magistrale offre competenze avanzate in filosofia, analisi teorica, argomentazione e ricerca interdisciplinare, con basi per l’insegnamento della filosofia e attenzione agli aspetti psicologici e pedagogici. La didattica prevede partecipazione attiva e studi distribuiti in tre aree: teorica, storico-filosofica e storia della scienza. Al termine del corso, gli studenti avranno acquisito conoscenze sull’evoluzione del pensiero filosofico e scientifico, strumenti metodologici per la ricerca e capacità di riflettere sui rapporti tra filosofia e altri ambiti del sapere.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/filosofia-e-forme-del-sapere-wffr-lm/#piano-di-studi"}, {"nome": "Informatica Umanistica", "tipo": "magistrale", "descrizione": "Informatica Umanistica (2 anni, accesso libero)\nLa laurea magistrale forma professionisti in grado di integrare competenze informatiche e umanistiche, progettando e gestendo progetti digitali per la conservazione, valorizzazione e fruizione del patrimonio culturale. Il percorso include insegnamenti teorici e pratici, laboratori, progetti e tirocini, e approfondisce archiviazione digitale, analisi dei dati, intelligenza artificiale e linguistica computazionale. Si articola in quattro percorsi: Tecnologie del linguaggio, Editoria digitale, Management della conoscenza, Grafica, interattività e ambienti virtuali.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/informatica-umanistica-wfur-lm/#piano-di-studi"}, {"nome": "Italianistica", "tipo": "magistrale", "descrizione": "Italianistica (2 anni, accesso libero)\nLa laurea magistrale offre una conoscenza approfondita dei testi e contesti della civiltà letteraria italiana medievale, moderna e contemporanea, con approccio comparatistico e plurilinguistico. Il corso prevede due percorsi: Filologico-linguistico e Critico-letterario, e sviluppa competenze per didattica e ricerca, basate sull’analisi diretta dei testi e sulla storia della tradizione letteraria. Particolare attenzione è data al rapporto tra lingua letteraria, bilinguismo e dialetti. Le discipline principali includono letteratura italiana e contemporanea, linguistica italiana, filologia italiana e digitale.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/italianistica-wta-lm/#piano-di-studi"}, {"nome": "Lingue, Letterature e Filologie Euro-Americane", "tipo": "magistrale", "descrizione": "Lingue e Letterature Moderne Europee e Americane (2 anni, accesso libero)\nLa laurea magistrale forma professionisti con solida padronanza orale e scritta di una o due lingue straniere europee (francese, inglese, portoghese, russo, spagnolo, tedesco, polacco) e conoscenza approfondita delle relative letterature, con attenzione anche a contesti storici ed extraeuropei. Il percorso sviluppa competenze filologiche, teorico-comparatistiche e didattiche, e include l’uso di strumenti informatici applicati alle lingue. Si articola in due curricula: Critico-letterario (monolingue o bilingue) e Teorico-comparatistico, approfondendo discipline come lingua e letteratura straniera, letteratura italiana, filologia.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/lingue-letterature-e-filologie-euro-americane-wlur-lm/#piano-di-studi"}, {"nome": "Linguistica e Traduzione", "tipo": "magistrale", "descrizione": "Linguistica e Traduzione (2 anni, accesso libero)\nLa laurea magistrale fornisce conoscenze approfondite sulle teorie del linguaggio, analisi dei sistemi linguistici e competenze traduttive per lingue antiche e moderne. Il corso si articola in due curricula, ciascuno con due percorsi: Linguistica (Teorico-applicato o Storico-comparativo) e Traduzione (Linguistica per la traduzione o Traduzione letteraria). Gli studenti approfondiscono linguistica teorica, applicata o storica, teoria e pratica della traduzione e lingue straniere (francese, inglese, polacco, portoghese, romeno, russo, spagnolo, tedesco; latino o greco per traduzione classica).", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/linguistica-e-traduzione-wlt-lm/#piano-di-studi"}, {"nome": "Scienze per la Pace: Trasformazione dei Conflitti e Cooperazione allo Sviluppo", "tipo": "magistrale", "descrizione": "Scienze per la Cooperazione allo Sviluppo (2 anni, accesso libero)\nLa laurea magistrale forma professionisti con competenze per operare in contesti complessi, emergenze e conflitti, grazie a una formazione interdisciplinare che integra cultura umanistica e scientifica, strumenti di analisi critica e capacità progettuali. Il corso prevede un primo anno comune e tre curricula: Peace Building, Cooperazione Umanitaria, Regolazione Pacifica dei Conflitti e Terrorismo. È possibile, tramite selezione, conseguire un doppio titolo con l’Università di Paris-Dauphine.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-per-la-pace-trasformazione-dei-conflitti-e-cooperazione-allo-sviluppo-wpxr-lm/#piano-di-studi"}, {"nome": "Storia dell'Arte", "tipo": "magistrale", "descrizione": "Storia dell’Arte (2 anni, accesso libero)\nLa laurea magistrale fornisce competenze per la ricerca e l’analisi critica nelle diverse aree ed epoche della storia dell’arte. Gli studenti possono approfondire arte medievale, moderna e contemporanea e specializzarsi in campi come collezionismo, museologia, architettura, arti visive e critica d’arte europea. Il percorso include sperimentazioni teoriche e pratiche su applicazioni informatiche, diritto dei beni culturali e diagnostica delle opere d’arte. Le principali discipline comprendono arte e multimedialità, comunicazione e processi di formazione, didattica della storia dell’arte, estetica del cinema e delle arti performative.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/storia-dell-arte-whar-lm/#piano-di-studi"}, {"nome": "Storia e Civiltà", "tipo": "magistrale", "descrizione": "Storia e Civiltà (2 anni, accesso libero)\nLa laurea magistrale forma specialisti nella ricerca, divulgazione e didattica della storia, con un percorso altamente specialistico che copre le dimensioni culturale, politica, economica, sociale e religiosa, includendo la prospettiva di genere. Il corso fornisce conoscenze sulle origini e caratteristiche della civiltà euro-mediterranea e amplia l’orizzonte a contesti extraeuropei. Il programma approfondisce metodologie di ricerca, tecniche di interpretazione delle fonti storiche e include insegnamenti specifici per la didattica di storia, geografia e filosofia.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/storia-e-civilta-wsrr-lm/#piano-di-studi"}, {"nome": "Studi Orientali ed Egittologici", "tipo": "magistrale", "descrizione": "Studi Orientali ed Egittologici (2 anni, accesso libero)\nLa laurea magistrale OEVO si concentra sull’archeologia, le lingue, le scritture e la storia delle civiltà dell’Egitto, del Vicino e Medio Oriente, dal IV millennio a.C. fino all’epoca contemporanea. Il corso si articola in tre curricula: Egittologico, Vicino e Medio Oriente, Ancient Egypt and Western Asia (in inglese). I percorsi offrono un approccio multidisciplinare, favorendo una visione comparativa e lo sviluppo del pensiero critico. Le attività comprendono scavi, ricerche sul campo e tirocini pratici in musei, biblioteche e altre istituzioni convenzionate.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/studi-orientali-ed-egittologici-woe-lm/#piano-di-studi"}, {"nome": "Discipline dello Spettacolo e della Comunicazione", "tipo": "triennale", "descrizione": "DISCO – Discipline dello Spettacolo e della Comunicazione (3 anni, accesso libero)\nIl corso di laurea forma professionisti nel campo della comunicazione, del cinema e dello spettacolo, con due percorsi: Spettacolo e Comunicazione. Il primo anno comune fornisce basi in letteratura, storia, psicologia, estetica... Dal secondo anno, il percorso Spettacolo approfondisce cinema, musica, teatro, costume e moda, con laboratori, seminari e stage; il percorso Comunicazione si concentra su filosofia, etica, economia e tecnologie dell’informazione, comprese applicazioni di intelligenza artificiale. Sono possibili soggiorni di studio all’estero e un doppio titolo con l’Università della Svizzera italiana.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/discipline-dello-spettacolo-e-della-comunicazione-dscr-l/#piano-di-studi"}, {"nome": "Filosofia", "tipo": "triennale", "descrizione": "Filosofia (3 anni, accesso libero)\nIl corso forma studenti con solide competenze nella riflessione critica e nell’elaborazione dell’argomentazione, offrendo una conoscenza completa della storia del pensiero filosofico e scientifico dall’antichità a oggi. Il percorso comprende anche dibattiti contemporanei in ambiti filosofici, logici, epistemologici, linguistici, estetici, etici, religiosi e politici, oltre a corsi di storia, lingue straniere e preparazione all’insegnamento.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/filosofia-filr-l/#piano-di-studi"}, {"nome": "Informatica Umanistica", "tipo": "triennale", "descrizione": "Informatica Umanistica (3 anni, accesso libero)\nIl corso forma professionisti in grado di applicare strumenti informatici al patrimonio culturale e alla gestione delle informazioni. Il percorso unisce materie umanistiche (letteratura, arti visive) e informatiche (programmazione, progettazione di sistemi digitali), con attenzione alla digitalizzazione e fruizione dei beni culturali. Le lezioni sono integrate da laboratori e progetti pratici. ", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/informatica-umanistica-ifur-l/#piano-di-studi"}, {"nome": "Lettere", "tipo": "triennale", "descrizione": "Lettere (3 anni, accesso libero)\nIl corso fornisce solide basi nelle discipline umanistiche, dalla classicità al contemporaneo, con competenze pratiche in lingua italiana e cultura europea. Si articola in due curricula, Antico e Moderno, e comprende letteratura italiana e straniera, glottologia, linguistica, storia, filosofia, storia dell’arte e della musica, filologia e critica letteraria, integrati con strumenti informatici e telematici. La didattica prevede corsi, seminari, esercitazioni e laboratori. ", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/lettere-letr-l/#piano-di-studi"}, {"nome": "Lingua e Cultura Italiana per Stranieri", "tipo": "triennale", "descrizione": "Lingua e Cultura Italiana per Stranieri (3 anni, accesso riservato a stranieri o italiani residenti all’estero, erogato interamente online)\nIl corso forma professionisti nello studio della lingua e cultura italiana, con la possibilità di seguire le lezioni secondo la propria disponibilità oraria. È pensato per chi non può frequentare corsi simili nel proprio paese, incontra ostacoli nella frequenza tradizionale o desidera un’esperienza internazionale. Il percorso si articola in quattro indirizzi: arti-musica-spettacolo, didattico-linguistico, letterario e storico-culturale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/lingua-e-cultura-italiana-per-stranieri-lisr-l/#piano-di-studi"}, {"nome": "Lingue, Letterature e Comunicazione Interculturale", "tipo": "triennale", "descrizione": "Lingue, Letterature e Comunicazione Interculturale (3 anni, accesso libero)\nIl corso forma laureati con competenze in due lingue straniere, analisi metalinguistica e conoscenza culturale e letteraria delle civiltà di riferimento. Si articola in tre curricula: letterario, linguistico e comunicazione interculturale/turistica, e prevede lo studio di due lingue straniere (inglese, francese, spagnolo, tedesco, portoghese, romeno, russo, arabo, polacco) e delle relative letterature, oltre a eventuale terza lingua, linguistica teorica, letteratura italiana, storia e filologia. ", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/lingue-letterature-e-comunicazione-interculturale-lilr-l/#piano-di-studi"}, {"nome": "Scienze dei Beni Culturali", "tipo": "triennale", "descrizione": "Scienze dei Beni Culturali (3 anni, accesso libero)\nIl corso forma laureati con solide competenze nei beni culturali, nella loro legislazione e nella gestione dell’informazione, con l’uso di almeno due lingue dell’Unione Europea e strumenti informatici. Si articola in tre curricula: storico-artistico, archeologico, Egitto e Vicino e Medio Oriente antichi, con focus rispettivamente su storia dell’arte, archeologia mediterranea e civiltà orientali. La didattica include corsi, laboratori, seminari e tirocini anche presso istituzioni esterne. ", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-dei-beni-culturali-sbc-l/#piano-di-studi"}, {"nome": "Scienze per la Pace: Cooperazione Internazionale e Trasformazione dei Conflitti", "tipo": "triennale", "descrizione": "Scienze Sociali per la Cooperazione, lo Sviluppo e la Pace (3 anni, accesso libero)\nIl corso forma laureati capaci di operare in contesti complessi, situazioni di emergenza e conflitto, con autonomia e capacità gestionali. La formazione interdisciplinare comprende scienze umanistiche, matematico-informatico-statistiche, economiche, giuridiche e sociologiche, con attenzione alla costruzione della pace e al benessere sociale. La didattica integra teoria e pratica, promuovendo lavoro di gruppo e partecipazione attiva, e prevede tirocini in Italia e all’estero.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-per-la-pace-cooperazione-internazionale-e-trasformazione-dei-conflitti-paxr-l/#piano-di-studi"}, {"nome": "Storia", "tipo": "triennale", "descrizione": "Storia (3 anni, accesso libero)\nIl corso forma laureati in grado di comprendere e comunicare il passato, interpretando il presente attraverso la ricerca storica. Si acquisiscono conoscenze su grandi temi e dibattiti storiografici, metodologie di trattamento e interpretazione delle fonti e un linguaggio storiografico rigoroso. Il percorso si articola in tre curricula: Storia Antica, Storia Medievale, Storia Moderna e Contemporanea, integrando lezioni, seminari, laboratori, conferenze e workshop.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/storia-stor-l/#piano-di-studi"}]}, {"id": "ingegneria", "nome": "Ingegneria", "colore": "#1a1a1a", "colore_testo": "#ffffff", "logo_statico": "assets/loghi/ingegneria.png", "logo_video": "assets/video/unipi_blu.mp4", "corsi": [{"nome": "Ingegneria Edile-Architettura (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Ingegneria Edile-Architettura (5 anni, accesso libero)\nIl corso forma professionisti capaci di progettare e gestire edifici e spazi urbani, unendo competenze ingegneristiche e architettoniche. Prevede lezioni teoriche, esercitazioni pratiche e laboratori obbligatori, con focus su storia dell’architettura, urbanistica e tecniche costruttive.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-edile-architettura-iear-lm5/#piano-di-studi"}, {"nome": "Artificial Intelligence and Data Engineering", "tipo": "magistrale", "descrizione": "Artificial Intelligence and Data Engineering (2 anni, accesso libero, in inglese)\nIl corso di laurea magistrale forma ingegneri specializzati nella gestione e nell’analisi di grandi quantità di dati e nello sviluppo di sistemi intelligenti basati su intelligenza artificiale. Offre solide competenze scientifiche e tecniche, consentendo di progettare e integrare sistemi informatici complessi in diversi contesti professionali. Il percorso approfondisce discipline come data mining e machine learning, basi di dati su larga scala, metodi di ottimizzazione e teoria dei giochi, e cloud computing.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/artificial-intelligence-and-data-engineering-wai-lm/#piano-di-studi"}, {"nome": "Bionics Engineering", "tipo": "magistrale", "descrizione": "Bionics Engineering (2 anni, acesso libero, in inglese) Il corso di laurea magistrale forma professionisti in grado di sviluppare dispositivi biorobotici e biomimetici innovativi, integrando ingegneria biomedica, biorobotica e ingegneria neurale. I laureati acquisiscono competenze per progettare neuroprotesi, sistemi sensoriali avanzati e tecnologie sanitarie personalizzate. Il percorso si articola in due curricula: Neural Engineering: progettazione di neuroprotesi e sistemi robotici interattivi per l’uomo. Biorobotics: sviluppo di modelli robotici umanoidi e animali, dispositivi per chirurgia e riabilitazione.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/bionics-engineering-wber-lm/#piano-di-studi"}, {"nome": "Communications Engineering", "tipo": "magistrale", "descrizione": "Ingegneria delle Telecomunicazioni (2 anni, accesso libero, in inglese)\nIl corso di laurea magistrale forma ingegneri specializzati nella progettazione e gestione di sistemi di comunicazione avanzati, capaci di rispondere alle esigenze di mercato e alle evoluzioni tecnologiche. I laureati e le laureate acquisiscono competenze nella progettazione di architetture di rete, apparati e sottosistemi, nella gestione di reti, servizi e sistemi di telecomunicazioni, e nel supporto tecnico-commerciale.\nIl corso si articola in due curricula:Internet and Wireless Communications e Radar, Remote Sensing and RF Technologies.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/communications-engineering-wct-lm/#piano-di-studi"}, {"nome": "Computer Engineering", "tipo": "magistrale", "descrizione": "Computer Engineering (2 anni, accesso libero, in inglese)\nIl corso di laurea magistrale forma ingegneri capaci di progettare, sviluppare e integrare sistemi di calcolo complessi, con una solida preparazione scientifica e tecnica nel campo dell’ingegneria informatica. Gli studenti possono scegliere tra tre indirizzi: Computer Systems and Networks: infrastrutture di calcolo e networking su larga scala. \nCyberphysical Systems: sistemi embedded e Internet of Things. Cybersecurity: progettazione di sistemi e applicazioni sicure.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/computer-engineering-wcn-lm/#piano-di-studi"}, {"nome": "Cybersecurity", "tipo": "magistrale", "descrizione": "Cybersecurity (2 anni, accesso libero, in inglese)\nIl corso di laurea magistrale forma professionisti specializzati nella sicurezza dei sistemi, delle reti e delle tecnologie informatiche, con competenze che spaziano dall’hardware al software e all’intelligenza artificiale. Gli studenti apprendono anche aspetti giuridici e organizzativi, in modo da inquadrare la cybersecurity nel contesto operativo. Al termine del percorso, i laureati sono in grado di progettare infrastrutture e sistemi sicuri, valutare rischi informatici, sviluppare soluzioni innovative per la sicurezza dei dati e garantire la conformità alla normativa vigente.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/cybersecurity-wcyr-lm/#piano-di-studi"}, {"nome": "Engineering of Paper and Cardboard", "tipo": "magistrale", "descrizione": "Technology and Production of Paper and Cardboard (2 anni, accesso libero, in inglese)\nIl corso di laurea magistrale forma ingegneri specializzati nella gestione dei processi di produzione e trasformazione di carta e cartone. Gli studenti acquisiscono competenze nella progettazione, controllo e ottimizzazione di macchine e impianti, nella gestione dei materiali e dei processi chimici, e nell’implementazione di sistemi di automazione e digitalizzazione secondo i principi di Industria.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/engineering-of-paper-and-cardboard-wep-lm/#piano-di-studi"}, {"nome": "Ingegneria Aerospaziale", "tipo": "magistrale", "descrizione": "Aerospace Engineering (2 anni, accesso libero, in inglese e italiano)\nIl corso di laurea magistrale forma ingegneri specializzati nella progettazione e gestione di sistemi aeronautici e spaziali, fornendo solide competenze teorico-scientifiche e capacità progettuali avanzate. Il percorso si articola in due curricula: \nAeronautico, con due indirizzi: Aerodinamica e meccanica del volo; Strutture e impianti. Spaziale, con un percorso in lingua inglese (MSSE – Master of Science in Space Engineering).", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-aerospaziale-wiar-lm/#piano-di-studi"}, {"nome": "Ingegneria Biomedica", "tipo": "magistrale", "descrizione": "Ingegneria biomedica (2 anni, accesso libero)\nl corso di laurea magistrale in Ingegneria biomedica ha durata di due anni e prevede accesso libero. Forma ingegneri e ingegnere in grado di progettare, realizzare e validare dispositivi e soluzioni biomedicali, integrando competenze ingegneristiche e medico-biologiche. Gli studenti ricevono una solida preparazione teorico-scientifica nelle scienze di base, utile per affrontare problemi complessi, e possono scegliere tra i curricula Bioinformatica e biostrumentazioni o Tecnologie biomediche.", "url": ""}, {"nome": "Ingegneria Chimica", "tipo": "magistrale", "descrizione": "Ingegneria chimica (2 anni, accesso libero)\nIl corso di laurea magistrale forma professionisti capaci di gestire e progettare impianti industriali, operare nella ricerca e nello sviluppo di tecnologie e materiali innovativi, e contribuire alla sicurezza e alla sostenibilità ambientale. Gli studenti acquisiscono competenze in termodinamica, meccanica dei fluidi, trasporto di materia ed energia, tecnologie di separazione, cinetica delle reazioni chimiche, progettazione di reattori e ottimizzazione dei processi. Il percorso prevede collaborazioni con il mondo industriale per favorire l’inserimento professionale.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-chimica-wicr-lm/#piano-di-studi"}, {"nome": "Ingegneria Elettrica", "tipo": "magistrale", "descrizione": "Ingegneria elettrica (2 anni, accesso libero)\nIl corso di laurea magistrale forma ingegneri in grado di affrontare le applicazioni dei fenomeni elettromagnetici in ambito energetico e tecnologico, integrando competenze progettuali, sistemistiche e gestionali. La formazione copre settori come smart grids, intelligenza artificiale, compatibilità elettromagnetica, meccatronica, veicoli elettrici e ibridi, oltre alla caratterizzazione dei materiali, con un approccio interdisciplinare che include anche aspetti economico-gestionali e mercati elettrici.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-elettrica-wil-lm/#piano-di-studi"}, {"nome": "Ingegneria Elettronica", "tipo": "magistrale", "descrizione": "Ingegneria elettronica (2 anni, accesso libero)\nIl corso di laurea magistrale forma ingegneri e ingegnere con competenze avanzate nelle tecnologie e nei processi dell’ingegneria dell’informazione, capaci di progettare e realizzare dispositivi elettronici integrati e sistemi complessi. La formazione approfondisce elettronica analogica e digitale, dispositivi e tecnologie micro- e nano-elettroniche, con applicazioni in automotive, automazione industriale, gestione dell’energia e sistemi informativi.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-elettronica-wie-lm/#piano-di-studi"}, {"nome": "Ingegneria Energetica", "tipo": "magistrale", "descrizione": "Ingegneria energetica (2 anni, accesso libero)\nIl corso di laurea magistrale forma professionisti e professioniste esperti nella progettazione, ricerca applicata, diagnosi energetica e gestione di sistemi e componenti per l’energia. Il percorso sviluppa una solida cultura tecnico-scientifica, con attenzione all’efficienza energetica e alla sostenibilità ambientale. La formazione copre le principali aree dell’ingegneria energetica, includendo termoenergetica, elettrica, chimica e meccanica, con approfondimenti su trasmissione del calore, gestione dei sistemi elettrici.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-energetica-winr-lm/#piano-di-studi"}, {"nome": "Ingegneria Gestionale", "tipo": "magistrale", "descrizione": "Ingegneria gestionale (2 anni, accesso libero)\nIl corso di laurea magistrale forma professionisti e professioniste capaci di progettare e gestire sistemi, processi, modelli di business, prodotti e servizi complessi e innovativi. Il percorso integra la formazione tecnico-ingegneristica con competenze gestionali, organizzative ed economiche, per garantire coerenza tra scelte tecnologiche e strategie aziendali. La didattica comprende una parte comune di base, seguita da due curricula: Digital Product Innovation e Smart Industry.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-gestionale-wig-lm/#piano-di-studi"}, {"nome": "Ingegneria Meccanica", "tipo": "magistrale", "descrizione": "Ingegneria meccanica (2 anni, accesso libero)\nIl corso di laurea magistrale forma professionisti e professioniste con elevate competenze tecniche, capaci di innovare nell’ideazione, sviluppo e ottimizzazione di prodotti e processi. Gli studenti acquisiscono conoscenze approfondite nei principali settori industriali, per ricoprire ruoli di responsabilità nell’industria o nel terziario avanzato. La formazione include progettazione, sperimentazione, che sviluppano la capacità di applicare strumenti moderni di modellazione e analisi.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-meccanica-wme-lm/#piano-di-studi"}, {"nome": "Ingegneria Robotica e dell'Automazione", "tipo": "magistrale", "descrizione": "Ingegneria robotica e dell’automazione (2 anni, accesso libero)\nIl corso di laurea magistrale forma professionisti e professioniste in grado di operare nei settori dell’automazione industriale, della robotica mobile su aria, terra, mare e spazio, dei veicoli autonomi e dei sistemi automatici a servizio della società. La formazione integra conoscenze scientifiche e tecnologiche su modellazione, simulazione e controllo dei sistemi per l’automazione, robotica industriale e mobile. Rivolto a laureati di diversi ambiti come ingegneria informatica, elettronica, il corso sviluppa competenze multidisciplinari per affrontare problemi complessi, permettendo di scegliere un percorso focalizzato sul controllo dei veicoli o sulla gestione dei sistemi automatizzati.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-robotica-e-dell-automazione-wim-lm/#piano-di-studi"}, {"nome": "Ingegneria Strutturale e Edile", "tipo": "magistrale", "descrizione": "Ingegneria strutturale e edile (2 anni, accesso libero)\nIl corso di laurea magistrale prepara professionisti e professioniste alla progettazione, costruzione e gestione di edifici, ponti e strutture speciali. Il percorso sviluppa capacità di elaborare e applicare idee innovative nell’ingegneria civile, con particolare attenzione all’ingegneria strutturale, alle costruzioni civili e ai sistemi edilizi e impiantistici. I laureati acquisiscono competenze per pianificare, progettare, realizzare e gestire sistemi, operando con una visione europea.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-strutturale-e-edile-wisr-lm/#piano-di-studi"}, {"nome": "Ingegneria dei Veicoli", "tipo": "magistrale", "descrizione": "Ingegneria dei veicoli (2 anni, accesso libero)\nIl corso di laurea magistrale forma specialisti in grado di affrontare le sfide progettuali, produttive e gestionali nel settore dei veicoli per il trasporto terrestre. Gli studenti acquisiscono competenze in progettazione, dinamica dei veicoli, veicoli elettrici e ibridi, sistemi elettrici ed elettronici, controllo e aerodinamica applicata, preparandosi a operare in contesti produttivi competitivi con attenzione a prestazioni, efficienza energetica e sostenibilità ambientale.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-dei-veicoli-wvt-lm/#piano-di-studi"}, {"nome": "Ingegneria delle Infrastrutture Civili e dell'Ambiente", "tipo": "magistrale", "descrizione": "Ingegneria delle infrastrutture civili e dell'ambiente (2 anni, accesso libero)\nIl corso di laurea magistrale forma ingegneri capaci di ideare, progettare, realizzare e gestire infrastrutture civili e sistemi idraulici complessi, con un approccio interdisciplinare. Gli studenti acquisiscono competenze progettuali e operative attraverso lezioni, esercitazioni, seminari, attività sperimentali nei laboratori e lo sviluppo di progetti a diverse scale, preparandosi a operare in contesti innovativi e di ricerca.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/ingegneria-delle-infrastrutture-civili-e-dell-ambiente-wivr-lm/#piano-di-studi"}, {"nome": "Materials and Nanotechnology", "tipo": "magistrale", "descrizione": "Materials and Nanotechnology (2 anni, accesso programmato locale, in inglese)\nIl corso di laurea magistrale forma professionisti e professioniste con competenze multidisciplinari sui materiali avanzati, biomateriali e metamateriali per elettronica e fotonica, con particolare attenzione alle nanotecnologie. Il percorso sviluppa conoscenze sulle proprietà fisiche, chimiche, meccaniche ed elettroniche. Il corso prevede tre curricula: Advanced Materials, focalizzato sulla progettazione e utilizzo di materiali per l’industria manifatturiera; Biomaterials, orientato alle applicazioni dei materiali avanzati nelle scienze della vita; Nanoscience and Nanotechnology, dedicato allo sviluppo di nanotecnologie e metamateriali per dispositivi fotonici, elettronici e optoelettronici.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/materials-and-nanotechnology-wnn-lm/#piano-di-studi"}, {"nome": "Nuclear Engineering", "tipo": "magistrale", "descrizione": "Nuclear Engineering (2 anni, accesso libero, in inglese)\nIl corso di laurea magistrale forma ingegneri e ingegnere specializzati nella ricerca e nelle applicazioni dell’energia nucleare. Basato sulla tradizione dell’Università di Pisa, il percorso fornisce competenze tecnico-scientifiche in tecnologia nucleare e radiazioni, preparando professionisti per l’industria nucleare nazionale e internazionale. Gli studenti acquisiscono conoscenze sull’affidabilità e sicurezza dei reattori, misure delle radiazioni e loro effetti.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/nuclear-engineering-wsnr-lm/#piano-di-studi"}, {"nome": "Ingegneria Aerospaziale", "tipo": "triennale", "descrizione": "Ingegneria Aerospaziale (3 anni, accesso programmato locale)\nLa laurea triennale forma professionisti in grado di aggiornarsi e adattarsi al rapido sviluppo delle scienze e tecnologie aerospaziali. Il percorso combina discipline di base (matematica, fisica, chimica) con materie specifiche del settore aerospaziale, preparando alla progettazione e verifica di componenti e all’attività nei servizi aeronautici. Le principali discipline includono disegno tecnico industriale, ingegneria dei materiali, tecnologie e laboratorio di simulazione, progettazione di strutture aerospaziali.", "url": ""}, {"nome": "Ingegneria Biomedica", "tipo": "triennale", "descrizione": "Ingegneria Biomedica (3 anni, accesso programmato locale)\nLa laurea triennale forma professionisti in grado di applicare competenze ingegneristiche a problemi medico-biologici, integrando conoscenze scientifiche, tecniche e multidisciplinari. Il percorso include analisi e progettazione di dispositivi biomedici. Le principali discipline sono biomateriali, impianti protesici, biomeccanica, biostatistica, fenomeni bioelettrici, tecnologie sanitarie e modelli di organi artificiali. Il terzo anno si articola in due curricula: Informazione e Industriale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-biomedica-ibmr-l/#piano-di-studi"}, {"nome": "Ingegneria Chimica", "tipo": "triennale", "descrizione": "Ingegneria Chimica (3 anni, accesso libero)\nLa laurea triennale fornisce fondamenti metodologici, matematici e fisici, insieme a competenze tecniche di base per operare nel settore industriale e dei servizi. Gli studenti acquisiscono conoscenze per gestire processi e impianti, con applicazioni nei settori chimico, petrolchimico e in tutte le aree che prevedono trasformazioni della materia. Il percorso prepara sia alla prosecuzione degli studi sia all’inserimento nel mondo industriale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-chimica-ichr-l/#piano-di-studi"}, {"nome": "Ingegneria Civile Ambientale e Edile", "tipo": "triennale", "descrizione": "Ingegneria Civile, Ambientale ed Edile (3 anni, accesso libero)\nIl corso forma professionisti con solide basi matematiche, fisiche, chimiche e informatiche, integrando competenze tecniche per l’attività dell’ingegnere civile edile junior. Si studiano materie di base (matematica, geometria, fisica generale) e materie professionalizzanti differenziate per curriculum: civile-ambientale ed edile. Le discipline principali includono architettura tecnica, scienza e tecnica delle costruzioni, infrastrutture stradali e idrauliche.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-civile-ambientale-e-edile-icer-l/#piano-di-studi"}, {"nome": "Ingegneria Elettronica", "tipo": "triennale", "descrizione": "Ingegneria Elettronica (3 anni, accesso libero)\nIl corso prepara professionisti in grado di progettare e gestire componenti, circuiti e sistemi elettronici, con una formazione solida in matematica, fisica e chimica. Il percorso combina lezioni teoriche e attività pratiche, con focus su elettrotecnica, elettronica digitale, architettura dei sistemi e applicazioni per l’energia alternativa.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-elettronica-ielr-l/#piano-di-studi"}, {"nome": "Ingegneria Gestionale", "tipo": "triennale", "descrizione": "Ingegneria Gestionale (3 anni, accesso libero)\nIl corso forma professionisti in grado di analizzare, organizzare e migliorare processi e strutture aziendali, adottando un approccio ingegneristico e multidisciplinare. Il percorso unisce insegnamenti di base in matematica, fisica ed economia a discipline tecniche industriali, informatica, automazione e gestione della qualità.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-gestionale-iger-l/#piano-di-studi"}, {"nome": "Ingegneria Informatica", "tipo": "triennale", "descrizione": "Ingegneria Informatica (3 anni, accesso libero)\nIl corso prepara laureati capaci di progettare, gestire e integrare sistemi informatici, software, reti e sistemi di automazione industriale. Il percorso include matematica, fisica, programmazione, basi di dati, reti informatiche, ingegneria del software e telecomunicazioni, formando professionisti in grado di comprendere l’interazione dei sistemi informatici con l’intero settore ICT.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-informatica-ifor-l/#piano-di-studi"}, {"nome": "Ingegneria Meccanica", "tipo": "triennale", "descrizione": "Ingegneria Meccanica (3 anni, accesso libero)\nIl corso forma professionisti capaci di progettare e gestire sistemi meccanici e impianti industriali, con possibilità di lavorare in settori come energia, trasporti e telecomunicazioni. Il percorso comprende matematica, fisica, chimica, meccanica applicata, materiali, disegno,e offre due curricula: meccanico e nucleare.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-meccanica-imcr-l/#piano-di-studi"}, {"nome": "Ingegneria dell'Energia", "tipo": "triennale", "descrizione": "Ingegneria dell’Energia (3 anni, accesso libero)\nIl corso fornisce conoscenze scientifiche di base (matematica, fisica, chimica) e competenze nei settori dell’ingegneria industriale, con focus su termodinamica applicata, elettrotecnica e sistemi elettrici e chimici. Offre una formazione interdisciplinare per affrontare problemi legati all’uso dell’energia, alle trasformazioni energetiche, agli apparati, agli impianti e alla pianificazione energetica.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-dell-energia-igtr-l/#piano-di-studi"}, {"nome": "Ingegneria delle Telecomunicazioni", "tipo": "triennale", "descrizione": "Ingegneria delle Telecomunicazioni (3 anni, accesso libero)\nIl corso forma tecnici qualificati capaci di contribuire all’innovazione e alla modernizzazione delle imprese tramite tecnologie avanzate. Gli studenti acquisiscono competenze nella progettazione, gestione, organizzazione e supporto alla ricerca nel settore. La formazione include discipline matematiche, fisiche e informatiche, e corsi su: trasmissione digitale, telematica. Tra le materie principali troviamo fondamenti di elettromagnetismo, segnali e sistemi, digital signal processing.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-delle-telecomunicazioni-itcr-l/#piano-di-studi"}, {"nome": "Ingegneria per il Design Industriale", "tipo": "triennale", "descrizione": "Ingegneria per il Design Industriale (3 anni, accesso libero)\nIl corso forma professionisti in grado di integrare ingegneria e creatività per lo sviluppo di prodotti e servizi industriali. Gli studenti acquisiscono competenze lungo tutto il ciclo di progettazione, dalla concezione alla produzione e post-produzione, con attenzione alla progettazione centrata sull’utente, sostenibilità, eco-design, sistemi multidisciplinari e innovazione aziendale, inclusa la virtualizzazione dei processi.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ingegneria-per-il-design-industriale-idir-l/#piano-di-studi"}, {"nome": "Scienze Marittime e Navali", "tipo": "triennale", "descrizione": "Scienze Marittime e Navali (5 anni, accesso programmato)\nIl corso, gestito dall’Accademia Navale di Livorno, forma ufficiali di Stato Maggiore della Marina Militare, preparati a ruoli di comando con solide competenze scientifiche, tecnologiche, umanistiche e sociopolitiche. Il percorso unisce lezioni teoriche, addestramento pratico e attività di coordinamento, con applicazioni in ambiti terrestri, navali e aerei, sicurezza interna ed esterna, tutela del territorio e degli interessi strategici dello Stato.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-marittime-e-navali-sma-l/#piano-di-studi"}, {"nome": "Tecniche per la Meccanica e la Produzione", "tipo": "triennale", "descrizione": "Tecniche per la Meccanica e la Produzione (3 anni, accesso libero)\nIl corso forma professionisti con solide competenze tecnico-ingegneristiche in ambito meccanico e conoscenze sui sistemi produttivi, gestione impianti, qualità e sicurezza. Il percorso prevede attività di laboratorio, tirocinio in aziende o enti pubblici/privati e insegnamenti teorici e pratici, preparandoli all’inserimento diretto nel mondo del lavoro, in particolare nello sviluppo prodotto e nelle aree produttivo-logistiche delle PMI.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-per-la-meccanica-e-la-produzione-tmp-l/#piano-di-studi"}, {"nome": "Tecniche per le Costruzioni Civili e la Gestione del Territorio", "tipo": "triennale", "descrizione": "Tecniche per le Costruzioni Civili e la Gestione del Territorio (3 anni, accesso libero)\nIl corso forma professionisti con solide competenze tecniche applicative, pronti per un inserimento immediato nel mondo del lavoro. Il percorso combina una preparazione di base in matematica, fisica e chimica con discipline specifiche come topografia, rilievo digitale, architettura, urbanistica, protezione del territorio, estimo e sicurezza nei cantieri.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-per-le-costruzioni-civili-e-la-gestione-del-territorio-tcc-l/#piano-di-studi"}]}, {"id": "medicina", "nome": "Medicina e Farmacia", "colore": "#ed1c2c", "colore_testo": "#ffffff", "logo_statico": "assets/loghi/medicina.png", "logo_video": "assets/video/unipi_rosso.mp4", "corsi": [{"nome": "Chimica e Tecnologie Farmaceutiche (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Chimica e Tecnologia Farmaceutiche (5 anni, accesso programmato locale) forma professionisti capaci di seguire l’intero processo di sviluppo del farmaco, dalla progettazione alla produzione e commercializzazione. La formazione integra competenze biologiche e chimiche con discipline specifiche in ambito chimico-farmaceutico, biochimico-farmacologico e tecnologico-farmaceutico. Sono previste attività con obbligo di frequenza, un tirocinio di 900 ore in farmacia o farmacia ospedaliera e agevolazioni per studenti lavoratori o genitori. Il corso abilita alla professione di farmacista e consente l’accesso all’esame di stato per chimici.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/chimica-e-tecnologia-farmaceutiche-chtfr-lm5/#piano-di-studi"}, {"nome": "Farmacia (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Farmacia (5 anni, accesso programmato locale)\nIl corso forma figure professionali con competenze multidisciplinari in ambito chimico-biologico e farmacologico, capaci di garantire il corretto uso dei farmaci e di collaborare con pazienti, medici e strutture sanitarie. Prevede obbligo di frequenza, 900 ore di tirocinio in farmacia o in ospedale e una preparazione che integra aspetti teorici, pratici e normativi.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/farmacia-farmr-lm5/#piano-di-studi"}, {"nome": "Medicina e Chirurgia (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Medicina e Chirurgia (6 anni, accesso programmato nazionale) forma medici e mediche con solide basi scientifiche e pratiche, capaci di affrontare in autonomia problemi di salute preventivi, diagnostici, terapeutici e riabilitativi. Il percorso integra discipline biomediche, cliniche, sociali ed etiche, con attività pratiche, laboratori e tirocini, per sviluppare competenze professionali, decisionali e relazionali. Il titolo consente l’esercizio della professione di medico-chirurgo e rappresenta requisito per l’accesso alle Scuole di Specializzazione.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/medicina-e-chirurgia-medr-lm6/#piano-di-studi"}, {"nome": "Odontoiatria e Protesi Dentaria (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": " Odontoiatria e Protesi Dentaria (6 anni, accesso programmato nazionale) forma professionisti abilitati a prevenire, diagnosticare e trattare le malattie orali e dentali, con competenze sui biomateriali e conoscenze epidemiologiche del territorio. Il percorso integra discipline teoriche e pratiche, abilità organizzative e lavoro in équipe, permettendo di eseguire esami obiettivi del cavo orale, trattamenti conservativi, restaurativi e interventi chirurgici. Il titolo consente l’esercizio della professione di odontoiatra.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/odontoiatria-e-protesi-dentaria-odor-lm6/#piano-di-studi"}, {"nome": "Psicologia Clinica e Scienze Comportamentali", "tipo": "magistrale", "descrizione": "Psicologia Clinica e Scienze Comportamentali (2 anni, accesso libero) forma professionisti in grado di progettare, valutare e gestire interventi psicologici di prevenzione, diagnosi, riabilitazione e sostegno per individui, famiglie e gruppi. Il percorso integra conoscenze teoriche, operative e di ricerca, con approfondimenti su approcci clinici, psicosomatica, promozione della salute e psicoterapie. I laureati acquisiscono autonomia professionale, capacità valutativa e competenze collaborative avanzate.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/psicologia-clinica-e-scienze-comportamentali-wpsr-lm/#piano-di-studi"}, {"nome": "Scienze Infermieristiche e Ostetriche", "tipo": "magistrale", "descrizione": "Scienze Infermieristiche ed Ostetriche (2 anni, accesso libero) forma professionisti con competenze assistenziali avanzate e capacità manageriali, organizzative e comunicative per gestire e monitorare i bisogni del cittadino nel sistema sanitario e sociosanitario. Il percorso integra conoscenze su organizzazione dei reparti, gestione del personale, formazione, ricerca e processi assistenziali avanzati, con stage pratici. Il titolo consente l’accesso a ruoli professionali avanzati e alla ricerca nel settore sanitario.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-infermieristiche-e-ostetriche-wio-lm/#piano-di-studi"}, {"nome": "Scienze Riabilitative delle Professioni Sanitarie", "tipo": "magistrale", "descrizione": "Scienze Riabilitative delle Professioni Sanitarie (2 anni, accesso libero) forma professionisti con competenze avanzate nei processi assistenziali, gestionali, formativi e di ricerca nell’area sanitaria. Il percorso integra conoscenze in scienze mediche, giuridiche, psicologiche, pedagogiche, epidemiologia e statistica, con attività didattica e tirocini pratici. Il titolo consente ruoli professionali di coordinamento, gestione del personale e innovazione nei servizi sanitari.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-riabilitative-delle-professioni-sanitarie-wrb-lm/#piano-di-studi"}, {"nome": "Scienze della Nutrizione Umana", "tipo": "magistrale", "descrizione": "Scienze della Nutrizione Umana (2 anni, accesso libero) forma professionisti con competenze avanzate nella valutazione della qualità nutrizionale degli alimenti, nella sicurezza alimentare e nello stato nutrizionale della popolazione. Il percorso integra conoscenze biomediche, nutrizionali e cliniche, con approfondimenti su nutraceutica, nutrigenomica, nutrizione clinica e disturbi del comportamento alimentare, articolandosi nei curricula Nutrizione e Alimenti. Il titolo consente l’accesso all’esame di stato per Biologi e l’esercizio libero-professionale nel settore della nutrizione umana.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-della-nutrizione-umana-wnur-lm/#piano-di-studi"}, {"nome": "Scienze e Tecniche delle Attività Motorie Preventive e Adattate", "tipo": "magistrale", "descrizione": "Scienze e Tecniche delle Attività Motorie Preventive e Adattate (2 anni, accesso libero) forma professionisti in grado di progettare, condurre e gestire attività motorie specifiche, percorsi di prevenzione, rieducazione motoria e ricerca scientifica. Il percorso integra discipline biomediche, motorie, psicologiche e pedagogiche e si articola nei curricula Didattica, Ricerca e Prevenzione e Salute. Il titolo consente l’accesso a carriere professionali avanzate nel settore motorio e della salute.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-e-tecniche-delle-attivita-motorie-preventive-e-adattate-wmor-lm/#piano-di-studi"}, {"nome": "Dietistica", "tipo": "triennale", "descrizione": "Dietistica (3 anni, accesso programmato nazionale)\nIl corso di laurea forma professionisti in grado di elaborare programmi nutrizionali personalizzati, diffondere una corretta educazione alimentare e valutare la qualità degli alimenti lungo la catena di produzione. La preparazione integra conoscenze biomediche e igienico-preventive con competenze cliniche e comunicative, fornendo le basi per una corretta valutazione nutrizionale. Il percorso comprende insegnamenti di sociologia della salute, tecnologie alimentari, comunicazione terapeutica, disturbi del comportamento alimentare e analisi dei dati clinico-nutrizionali.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/dietistica-die-l/#piano-di-studi"}, {"nome": "Educazione Professionale", "tipo": "triennale", "descrizione": "Educazione professionale (3 anni, accesso programmato nazionale)\nIl corso di laurea forma educatori ed educatrici professionali, figure socio-sanitarie capaci di progettare e realizzare interventi educativi e riabilitativi all’interno di programmi terapeutici multidisciplinari, con l’obiettivo di favorire lo sviluppo equilibrato della personalità e il reinserimento psico-sociale delle persone in difficoltà. La formazione unisce una solida preparazione teorico-culturale nelle aree sanitaria, psico-pedagogica, sociologica e giuridica con un percorso tecnico-pratico che prevede attività di tirocinio in enti dedicati a persone in condizioni di fragilità. Questo approccio consente di acquisire competenze scientifiche, metodologiche e relazionali fondamentali per assumere una piena professionalità educativa.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/educazione-professionale-edp-l/#piano-di-studi"}, {"nome": "Fisioterapia", "tipo": "triennale", "descrizione": " Fisioterapia (3 anni, accesso programmato nazionale) forma fisioterapisti abilitati capaci di prevenire, curare e riabilitare disabilità motorie, psicomotorie e cognitive, anche in equipe multidisciplinari. Il percorso integra basi biomediche, discipline mediche specialistiche e tirocini progressivi fino a competenze professionali avanzate. Il titolo permette l’esercizio della professione e l’accesso a lauree magistrali o master di I livello in ambito riabilitativo.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/fisioterapia-ftp-l/#piano-di-studi"}, {"nome": "Igiene Dentale", "tipo": "triennale", "descrizione": "Igiene dentale(3 anni, accesso programmato nazionale) forma igienisti dentali abilitati alla prevenzione e alla tutela della salute del cavo orale, con capacità di educazione sanitaria e screening delle patologie odontostomatologiche. Il percorso integra conoscenze biologiche, chimiche e cliniche, tecniche di riabilitazione orale, deontologia professionale e tirocini guidati. Il titolo permette l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/igiene-dentale-igd-l/#piano-di-studi"}, {"nome": "Infermieristica", "tipo": "triennale", "descrizione": "Infermieristica (3 anni, accesso programmato nazionale) forma professionisti abilitati nel campo della prevenzione, cura e tutela della salute individuale e collettiva, capaci di operare in equipe multiprofessionali e di rispondere alle esigenze degli assistiti. Il percorso integra basi teoriche e pratiche, discipline mediche, chirurgiche, farmacologiche e psicologiche, con attività in laboratorio, simulazioni e tirocini progressivi, fino a competenze avanzate in sale operatorie, pronto soccorso, rianimazione e cure palliative. Il titolo permette l’esercizio della professione di infermiere e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/infermieristica-ife-l/#piano-di-studi"}, {"nome": "Logopedia", "tipo": "triennale", "descrizione": "Il corso triennale in Logopedia (3 anni, accesso programmato nazionale) forma professionisti abilitati alla prevenzione, cura e riabilitazione delle abilità comunicativo-linguistiche e delle funzioni orali in tutte le fasce d’età. Il percorso integra conoscenze sui disturbi del linguaggio, della voce e della deglutizione, con attività pratiche e lavoro in equipe.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/logopedia-log-l/#piano-di-studi"}, {"nome": "Ostetricia", "tipo": "triennale", "descrizione": "Ostetricia (3 anni, accesso programmato nazionale) forma professionisti abilitati alla prevenzione e tutela della salute della donna, con competenze nell’assistenza al neonato e nella gestione della gravidanza fisiologica. Il percorso integra conoscenze teoriche e pratiche in fisiologia e patologia ostetrica e ginecologica, assistenza ostetrico-neonatale, oncologia, endocrinologia e bioetica, con tirocini ospedalieri e territoriali. Il titolo permette l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/ostetricia-ost-l/#piano-di-studi"}, {"nome": "Podologia", "tipo": "triennale", "descrizione": "Podologia (3 anni, accesso programmato nazionale) forma professionisti abilitati alla prevenzione, cura e riabilitazione delle patologie del piede e dell’apparato locomotore. Il percorso integra conoscenze teoriche e pratiche in ortopedia, diagnostica, pediatria, geriatria, dermatologia, chirurgia vascolare e reumatologia, con tirocini e sviluppo di competenze organizzative e di lavoro in equipe. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/podologia-pod-l/#piano-di-studi"}, {"nome": "Scienze Motorie", "tipo": "triennale", "descrizione": "Scienze Motorie (3 anni, accesso libero) fornisce competenze scientifiche e tecniche nell’esercizio fisico e sportivo, nella valutazione funzionale e nella prescrizione dell’attività motoria per soggetti sani e con patologie croniche. Il percorso integra conoscenze in anatomia, fisiologia, biochimica, teoria e tecnica dello sport, allenamento, valutazione nutrizionale e gestione di traumi sportivi. Il titolo consente l’accesso a lauree magistrali in Scienze e Tecniche delle Attività Motorie Preventive e Adattate e a master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-motorie-smor-l/#piano-di-studi"}, {"nome": "Scienze dei Prodotti Erboristici e della Salute", "tipo": "triennale", "descrizione": "Scienze dei prodotti erboristici e della salute (3 anni, accesso libero) forma esperti nell’utilizzo delle piante officinali per la salute, con competenze richieste dal sistema economico e produttivo territoriale. Il percorso integra conoscenze chimiche e biologiche generali e specifiche dei curricula in scienze erboristiche, informazione per la salute e controllo di qualità, con laboratori e un tirocinio pratico di 225 ore. Il titolo consente l’accesso agli esami di stato per la sezione B dell’Albo dei chimici, alla professione di agrotecnico laureato e a corsi di laurea magistrale in Scienze della nutrizione umana o Biotecnologie vegetali e microbiche.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-dei-prodotti-erboristici-e-della-salute-pesr-l/#piano-di-studi"}, {"nome": "Scienze e Tecniche di Psicologia Clinica e Sperimentale", "tipo": "triennale", "descrizione": "Scienze e Tecniche di Psicologia Clinica e Sperimentale (3 anni, accesso libero) forma professionisti in grado di svolgere attività di valutazione e intervento psicologico in contesti clinici, della salute e dei servizi alle persone, ai gruppi e alle comunità. Il percorso integra conoscenze psicologiche, biologiche, cliniche, etiche e statistiche, con tirocini pratici valutativi. Il titolo conferisce la qualifica di Dottore in tecniche psicologiche e consente l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-e-tecniche-di-psicologia-clinica-e-sperimentale-pspr-l/#piano-di-studi"}, {"nome": "Tecnica della Riabilitazione Psichiatrica", "tipo": "triennale", "descrizione": "Tecnica della Riabilitazione Psichiatrica (3 anni, accesso programmato nazionale) forma professionisti abilitati alla valutazione, prevenzione, cura, riabilitazione e reinserimento di persone con disabilità e patologie psichiatriche. Il percorso integra conoscenze biomediche, cliniche e professionali, competenze riabilitative e lavoro in équipe, con attenzione ai contesti familiari e socio-ambientali e alle differenze di età, sesso e patologia. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecnica-della-riabilitazione-psichiatrica-rip-l/"}, {"nome": "Tecniche Audiometriche", "tipo": "triennale", "descrizione": "Tecniche Audiometriche (3 anni, accesso programmato nazionale) forma professionisti abilitati all’esecuzione autonoma di procedure diagnostiche e attività tecnico-assistenziali nel campo audiologico. Il percorso integra conoscenze di base in medicina, fisica, statistica, chimica e biologia, con formazione pratica e tirocini per sviluppare competenze tecniche e comportamentali. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-audiometriche-tam-l/#piano-di-studi"}, {"nome": "Tecniche Audioprotesiche", "tipo": "triennale", "descrizione": "Tecniche Audioprotesiche (3 anni, accesso programmato nazionale) forma professionisti abilitati all’applicazione di presidi protesici uditivi e alla partecipazione a programmi di prevenzione e riabilitazione delle sordità. Il percorso integra conoscenze biomediche, igienico-preventive, audiologiche e audioprotesiche, con attenzione a tutte le fasce d’età, tecnologie impiantabili e speciali, e include attività pratiche e tirocini. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-audioprotesiche-tdp-l/#piano-di-studi"}, {"nome": "Tecniche della Prevenzione nell'Ambiente e nei Luoghi di Lavoro", "tipo": "triennale", "descrizione": "Tecniche della Prevenzione nell’Ambiente e nei Luoghi di Lavoro (3 anni, accesso programmato nazionale) forma professionisti abilitati alla prevenzione, controllo e vigilanza su ambienti di vita e lavoro, igiene, sicurezza e valutazione di alimenti, bevande e prodotti cosmetici. Il percorso integra conoscenze scientifiche, tecniche e normative con tirocini pratici. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-della-prevenzione-nell-ambiente-e-nei-luoghi-di-lavoro-tpa-l/#piano-di-studi"}, {"nome": "Tecniche di Laboratorio Biomedico", "tipo": "triennale", "descrizione": "
