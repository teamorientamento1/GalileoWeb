Tecniche di Laboratorio Biomedico (3 anni, accesso programmato nazionale) forma professionisti abilitati a eseguire procedure diagnostiche su materiali biologici e sulla persona. Il percorso integra conoscenze biologiche, biochimiche, microbiologiche e metodologiche, con competenze su strumentazione, sicurezza e radioprotezione, affiancate da tirocini pratici. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-di-laboratorio-biomedico-tlb-l/#piano-di-studi"}, {"nome": "Tecniche di Neurofisiopatologia", "tipo": "triennale", "descrizione": "Tecniche di Neurofisiopatologia (3 anni, accesso programmato nazionale) forma professionisti abilitati all’esecuzione di metodiche diagnostiche sulle patologie del sistema nervoso, tra cui EEG, EMG, potenziali evocati, ultrasonologia Doppler, poligrafia del sonno e del sistema neurovegetativo. Il percorso integra conoscenze di base in medicina, fisica, chimica, biologia e statistica, con formazione pratica e tirocini supervisionati. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-di-neurofisiopatologia-tnf-l/#piano-di-studi"}, {"nome": "Tecniche di Radiologia Medica, per Immagini e Radioterapia", "tipo": "triennale", "descrizione": "Tecniche di Radiologia Medica, per Immagini e Radioterapia (3 anni, accesso programmato nazionale) forma professionisti abilitati all’esecuzione di esami di diagnostica per immagini e radioterapia su pazienti, materiali biologici e in ambito veterinario. Il percorso integra conoscenze fisiche, biologiche e tecniche, informatica, radioprotezione e metodiche diagnostiche e radioterapiche, con tirocini pratici. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/tecniche-di-radiologia-medica-per-immagini-e-radioterapia-trm-l/#piano-di-studi"}, {"nome": "Terapia della Neuro e Psicomotricità dell'Età Evolutiva", "tipo": "triennale", "descrizione": "Terapia della Neuro e Psicomotricità dell’Età Evolutiva (3 anni, accesso programmato nazionale) forma professionisti abilitati alla prevenzione, cura e riabilitazione dei disturbi neuro-psichiatrici, psicomotori e neuropsicologici in età infantile e adolescenziale. Il percorso integra conoscenze biomediche, psicologiche e sociologiche, con attività pratiche, valutazioni funzionali e somministrazione di test diagnostici. Il titolo consente l’esercizio della professione e l’accesso a lauree magistrali o master di I livello.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/terapia-della-neuro-e-psicomotricita-dell-eta-evolutiva-tnp-l/#piano-di-studi"}]}, {"id": "giuridiche", "nome": "Scienze Giuridiche, Economiche e Sociali", "colore": "#edcb46", "colore_testo": "#1a1a1a", "logo_statico": "assets/loghi/giuridiche.png", "logo_video": "assets/video/unipi_giallo.mp4", "corsi": [{"nome": "Giurisprudenza (Ciclo unico)", "tipo": "ciclo_unico", "descrizione": "Giurisprudenza (5 anni, accesso libero) fornisce una solida preparazione giuridica e storica, sviluppando capacità di analisi, interpretazione e redazione di testi giuridici. Prevede lo studio di discipline come diritto costituzionale, privato, penale, dell’UE, comparato, del lavoro, della proprietà intellettuale, della robotica e dell’IA, oltre a criminologia e sociologia del diritto. Il titolo consente l’accesso all’esame di abilitazione forense e ai concorsi per magistratura e notariato.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/giurisprudenza-lmgr/#piano-di-studi"}, {"nome": "Banca, Finanza Aziendale e Mercati Finanziari", "tipo": "magistrale", "descrizione": "Banca, Finanza Aziendale e Mercati Finanziari (2 anni, accesso libero) forma specialisti in gestione finanziaria aziendale e intermediazione finanziaria, con conoscenze approfondite su mercati, finanza aziendale, economia bancaria e assicurativa. Il percorso si articola in due curricula: Corporate Finance e Mercati Finanziari e Intermediari e Mercati Finanziari.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/banca-finanza-aziendale-e-mercati-finanziari-wbfr-lm/#piano-di-studi"}, {"nome": "Comunicazione d'Impresa e Politica delle Risorse Umane", "tipo": "magistrale", "descrizione": "Comunicazione d’impresa e Politica delle Risorse Umane (2 anni, accesso libero) forma esperti nella gestione della comunicazione e delle risorse umane, con approccio interdisciplinare ai processi organizzativi, produttivi e comunicativi. Il percorso prevede due curricula: Comunicazione per le organizzazioni e Sviluppo delle risorse umane.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/comunicazione-d-impresa-e-politica-delle-risorse-umane-wcrr-lm/#piano-di-studi"}, {"nome": "Consulenza Professionale alle Aziende", "tipo": "magistrale", "descrizione": "Consulenza Professionale alle Aziende (2 anni, accesso libero) forma esperti in ambito fiscale, contabile, legale e di revisione, con competenze per supportare il management nelle scelte operative e strategiche. Il percorso affronta tematiche come diritto societario, pianificazione fiscale, procedure concorsuali, internal auditing e valutazione d’azienda.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/consulenza-professionale-alle-aziende-wcpr-lm/#piano-di-studi"}, {"nome": "Digital Intelligence and Change Management", "tipo": "magistrale", "descrizione": "Digital Intelligence and Change Management (2 anni, accesso libero, in inglese) forma professionisti in grado di guidare la trasformazione digitale delle organizzazioni, integrando aspetti tecnologici, organizzativi, culturali e sostenibili. Il percorso multidisciplinare include intelligenza digitale, cambiamento organizzativo, big data e analytics, con seminari e workshop internazionali.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/digital-intelligence-and-change-management-wdc-lm/#piano-di-studi"}, {"nome": "Diritto dell'Innovazione per l'Impresa e le Istituzioni", "tipo": "magistrale", "descrizione": "Diritto dell’innovazione per l’impresa e le istituzioni (2 anni, accesso libero) forma giuristi altamente qualificati nella regolazione delle tecnologie innovative, con preparazione multidisciplinare in ambito giuridico, economico, informatico e ingegneristico. Il percorso prevede due curricula, Giurista di impresa e Giurista delle istituzioni.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/diritto-dell-innovazione-per-l-impresa-e-le-istituzioni-wdir-lm/#piano-di-studi"}, {"nome": "Economics", "tipo": "magistrale", "descrizione": "Economics (2 anni, accesso libero, in inglese) forma professionisti capaci di analizzare e intervenire sui fenomeni economici a livello aziendale, nazionale e internazionale, sviluppando competenze avanzate in scienza economica e strumenti matematico-statistici. Il percorso prevede tre curricula: General Economics, Official Statistics e Quantitative Finance.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/economics-wesr-lm/#piano-di-studi"}, {"nome": "Gestione e Innovazione dei Servizi Sociali, Imprenditorialità Sociale e Management del Terzo Settore", "tipo": "magistrale", "descrizione": "Gestione e innovazione dei servizi sociali, imprenditorialità sociale e management del Terzo Settore (2 anni, accesso libero) forma professionisti capaci di progettare, gestire e valutare interventi sociali, con un percorso interdisciplinare che combina sociologia, psicologia, economia e diritto. Il primo anno è comune, mentre nel secondo anno si sceglie tra i curricula Programmazione, gestione e innovazione dei servizi sociali e Imprenditorialità sociale e management del Terzo settore.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/gestione-e-innovazione-dei-servizi-sociali-imprenditorialita-sociale-e-management-del-terzo-settore-wtsr-lm/#piano-di-studi"}, {"nome": "Istituzioni, Politica e Società", "tipo": "magistrale", "descrizione": "Istituzioni, politica e società (2 anni, accesso libero) forma professionisti con competenze avanzate nei sistemi politico-istituzionali e sociali, con approccio multidisciplinare in storia, politica, sociologia, diritto ed economia. Il percorso prevede due curricula: Istituzioni e politica e Istituzioni e società, con lezioni frontali, seminari e workshop professionalizzanti orientati a ricerca empirica e project management.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/istituzioni-politica-e-societa-wipr-lm/#piano-di-studi"}, {"nome": "Management e Controllo dei Processi Logistici", "tipo": "magistrale", "descrizione": "Management e controllo dei processi logistici (2 anni, accesso libero, Livorno) forma professionisti qualificati nella logistica e supply chain, con competenze multidisciplinari in economia, statistica, diritto e ingegneria dei trasporti. Prevede due curricula: Modelli gestionali e di analisi (ingegneristico-informatico) e Profili economico-giuridico-istituzionali (giuridico e relazioni internazionali).", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/management-e-controllo-dei-processi-logistici-wmlr-lm/#piano-di-studi"}, {"nome": "Marketing e Ricerche di Mercato", "tipo": "magistrale", "descrizione": "Marketing e ricerche di mercato (2 anni, accesso libero) forma professionisti capaci di raccogliere, elaborare e interpretare dati di mercato e di operare nella funzione marketing delle aziende. Il percorso sviluppa competenze nella gestione dei rapporti con la domanda e nelle metodologie di ricerca di mercato, sia quantitative che qualitative.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/marketing-e-ricerche-di-mercato-wmrr-lm/#piano-di-studi"}, {"nome": "Progettazione e Gestione dei Sistemi Turistici e degli Eventi", "tipo": "magistrale", "descrizione": "Progettazione e gestione dei sistemi turistici mediterranei (2 anni, accesso libero) forma professionisti in grado di qualificare l’offerta turistica, promuovere la cooperazione tra imprese e istituzioni e sviluppare prodotti turistici innovativi e sostenibili. Il percorso valorizza il legame tra turismo e territorio, sviluppando competenze in analisi della domanda e dell’offerta, utilizzo di tecnologie per la gestione dei prodotti turistici e strategie manageriali per le imprese turistiche. Prevede insegnamenti su sistemi turistici territoriali, politiche per il turismo, marketing e management culturale.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/progettazione-e-gestione-dei-sistemi-turistici-e-degli-eventi-wet-lm/#piano-di-studi"}, {"nome": "Scienze Marittime e Navali", "tipo": "magistrale", "descrizione": "Scienze marittime e navali (2 anni, accesso libero) forma l’Ufficiale di Stato Maggiore della Marina Militare, fornendo competenze culturali, tecnologiche, sociopolitiche e internazionali, insieme a un addestramento teorico-pratico. I laureati saranno in grado di operare, pianificare e coordinare unità navali, aeree e terrestri, gestire la sicurezza interna ed esterna, tutelare il territorio e gli interessi strategici dello Stato e dell’UE, e dirigere sistemi organizzativi complessi in contesti operativi, addestrativi o di emergenza.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-marittime-e-navali-wmn-lm/#piano-di-studi"}, {"nome": "Strategia, Management e Controllo", "tipo": "magistrale", "descrizione": "Strategia, Management e Controllo (2 anni, accesso libero) forma professionisti di alto profilo per ruoli manageriali a supporto del top management e della line in aziende private, enti pubblici, istituzioni e associazioni. Fornisce competenze in pianificazione strategica, gestione delle risorse umane, sistemi informativi, amministrazione e controllo, e supporta l’imprenditorialità e lo sviluppo delle imprese. Il percorso prevede un primo anno comune e al secondo anno la scelta tra tre curricula: Strategia e governo delle aziende, Costi-performance, Organizzazione aziendale e sistemi informativi.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/strategia-management-e-controllo-wsgr-lm/#piano-di-studi"}, {"nome": "Unione Europea, Processi Globali e Sostenibilità dello Sviluppo", "tipo": "magistrale", "descrizione": "Unione Europea, processi globali e sostenibilità dello sviluppo (2 anni, accesso libero) forma specialisti in grado di analizzare i fenomeni politico-istituzionali globali, il ruolo delle organizzazioni internazionali ed europee e contribuire a politiche e strategie in ambito internazionale. Approfondisce le criticità della globalizzazione e le tendenze delle relazioni internazionali legate alla sostenibilità. Il percorso comprende insegnamenti storici, politologici, giuridici, economici e sociologici, con un percorso comune e due curricula: L’UE: processi interni e sfide globali e Globalizzazione e sostenibilità, ciascuno articolato in due itinerari culturali.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/unione-europea-processi-globali-e-sostenibilita-dello-sviluppo-wuer-lm/#piano-di-studi"}, {"nome": "Banca, Finanza e Mercati Finanziari", "tipo": "triennale", "descrizione": "Banca, Finanza e Mercati Finanziari (3 anni, accesso libero) fornisce competenze per analizzare i sistemi finanziari e operare in banche, assicurazioni, società ed enti che si occupano di mercati monetari e creditizi. Nei primi anni offre basi economiche, aziendali, giuridiche e quantitative, mentre il terzo anno approfondisce conoscenze professionalizzanti su intermediari, strumenti e mercati, con attenzione anche all’ambito internazionale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/banca-finanza-e-mercati-finanziari-bfmr-l/#piano-di-studi"}, {"nome": "Diritto d'Impresa, del Lavoro e delle Pubbliche Amministrazioni", "tipo": "triennale", "descrizione": "Diritto dell’impresa, del lavoro e delle pubbliche amministrazioni (3 anni, accesso libero) offre due percorsi: pubblicistico, per formare giuristi della pubblica amministrazione e dei servizi sociali e giudiziari, e privatistico, per giuristi d’impresa e consulenti del lavoro. Combina formazione accademica e professionalizzante, con materie giuridiche di base integrate da conoscenze economiche e sociologiche. Approfondisce temi di diritto privato, amministrativo, penale, commerciale, del terzo settore, dell’immigrazione, europeo e internazionale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/diritto-dell-impresa-del-lavoro-e-delle-pubbliche-amministrazioni-dirr-l/#piano-di-studi"}, {"nome": "Economia Aziendale", "tipo": "triennale", "descrizione": "Economia aziendale (3 anni, accesso libero) fornisce competenze culturali e professionali nelle discipline manageriali per comprendere l’operatività delle diverse funzioni aziendali. Si articola in quattro curricula: amministrazione e contabilità, finanza, marketing e produzione, libera professione, management e controllo, integrati da temi trasversali come internazionalizzazione, sostenibilità e digitalizzazione.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/economia-aziendale-eazr-l/#piano-di-studi"}, {"nome": "Economia e Commercio", "tipo": "triennale", "descrizione": "Economia e Commercio (3 anni, accesso libero) forma professionisti in grado di analizzare i fenomeni economici di mercati e organizzazioni pubbliche e private. Offre una preparazione multidisciplinare economica, aziendale, giuridica e quantitativa, articolata in quattro curricula: Analisi dei dati economici e finanziari, Economia per lo sviluppo sostenibile, Economia, diritto e management, Scienze economiche.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/economia-e-commercio-ecor-l/#piano-di-studi"}, {"nome": "Economia e Legislazione dei Sistemi Logistici", "tipo": "triennale", "descrizione": "Economia e Legislazione dei Sistemi Logistici (3 anni, accesso libero) forma professionisti per la gestione e valutazione delle infrastrutture e dei servizi di logistica e trasporto, con preparazione interdisciplinare economica, giuridica e organizzativa. Dopo un biennio comune, il terzo anno prevede due curricula: Logistica dei Trasporti, con focus informatico e ingegneristico, e Management e Legislazione dei Sistemi Logistici, incentrato su aspetti economici, giuridici e politici.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/economia-e-legislazione-dei-sistemi-logistici-elsr-l/#piano-di-studi"}, {"nome": "Giurisprudenza (Accademia Navale)", "tipo": "triennale", "descrizione": "Giurisprudenza (5 anni, programmato locale) fornisce una solida preparazione giuridica, sviluppando capacità di analisi, interpretazione ed elaborazione di testi giuridici. Accanto alle discipline classiche, offre insegnamenti opzionali specifici per la formazione degli ufficiali della Marina militare, come diritto internazionale dei conflitti armati, cyber security ed ecologia marina. Il titolo consente l’accesso all’esame di abilitazione forense e ai concorsi per magistratura e notariato.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/giurisprudenza-gacr/#piano-di-studi"}, {"nome": "Management for Business and Economics", "tipo": "triennale", "descrizione": "Management for Business and Economics (3 anni, programmato locale, in inglese) forma professionisti e professioniste nei settori del business e dell’economia, con un approccio internazionale e insegnamenti interamente in inglese. Prevede docenti internazionali, possibilità di doppia laurea con Nürtingen-Geislingen University e RANEPA University, e approfondisce strategia di marketing, finanza, contabilità, risorse umane e organizzazione, sviluppando competenze di leadership e lavoro in team.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/management-for-business-and-economics-mber-l/#piano-di-studi"}, {"nome": "Scienze Politiche", "tipo": "triennale", "descrizione": "Scienze Politiche (3 anni, accesso libero) forma laureati capaci di analizzare le dinamiche politico-istituzionali, sociali, economiche e giuridiche, sviluppando flessibilità analitica e capacità di adattamento. Il percorso interdisciplinare comprende discipline storiche, politologiche, sociologiche, economico-statistiche e giuridiche, con cinque curricula di approfondimento: storico-politologico, sociologico, internazionale, economico e giuridico.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-politiche-spnr-l/#piano-di-studi"}, {"nome": "Scienze del Servizio Sociale", "tipo": "triennale", "descrizione": "Scienze del servizio sociale (3 anni, accesso programmato locale) forma assistenti sociali generalisti, fornendo strumenti metodologici, deontologici e multidisciplinari per comprendere i bisogni delle persone, dei gruppi e della società. Il percorso integra discipline come sociologia, psicologia, economia e diritto con esperienze di tirocinio già dal secondo anno, e dà accesso all’esame di Stato per la professione di assistente sociale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-del-servizio-sociale-ssnr-l/#piano-di-studi"}, {"nome": "Scienze del Turismo", "tipo": "triennale", "descrizione": "Scienze del turismo (3 anni, accesso programmato locale) forma operatori professionali nel settore turistico, integrando conoscenze interdisciplinari con casi studio, testimonianze di esperti e stage presso enti pubblici e privati. La laurea è offerta congiuntamente dall’Università di Pisa, Pavia e della Svizzera Italiana di Lugano.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-del-turismo-strr-l/#piano-di-studi"}]}, {"id": "scienze", "nome": "Scienze Matematiche, Fisiche e Naturali", "colore": "#1283ba", "colore_testo": "#ffffff", "logo_statico": "assets/loghi/scienze.png", "logo_video": "assets/video/unipi_azzurro.mp4", "corsi": [{"nome": "Biologia Applicata alla Medicina", "tipo": "magistrale", "descrizione": "Biologia applicata alla biomedicina (2 anni, accesso libero) forma laureati con competenze avanzate in biologia applicata e tecnologie molecolari, biochimiche e genetiche. Prevede lo studio di fisiologia, patologia e metodologie statistiche, con lezioni, esercitazioni e laboratori.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biologia-applicata-alla-biomedicina-wnfr-lm/#piano-di-studi"}, {"nome": "Biologia Marina", "tipo": "magistrale", "descrizione": "Biologia marina (2 anni, accesso libero) forma laureati con competenze avanzate in biologia ed ecologia marina. Prevede lezioni, esercitazioni e laboratori, con focus su ambienti marini, organismi, processi ecologici e metodi scientifici per la ricerca autonoma. È prevista la possibilità di doppio titolo con la Zhejiang Ocean University in Cina.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biologia-marina-wbmr-lm/#piano-di-studi"}, {"nome": "Biologia Molecolare e Cellulare", "tipo": "magistrale", "descrizione": "Biologia molecolare e cellulare (2 anni, accesso libero) forma laureati con solide competenze metodologiche e teoriche, padronanza del metodo scientifico e conoscenze approfondite di biologia molecolare e cellulare. Il percorso include biochimica, genetica, microbiologia, tecnologie cellulari e DNA ricombinante, oltre a competenze in bioinformatica, matematica-statistica e normative bioetiche.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biologia-molecolare-e-cellulare-wtbr-lm/#piano-di-studi"}, {"nome": "Biotechnologies and Applied Artificial Intelligence for Health", "tipo": "magistrale", "descrizione": "Biotechnologies and Applied Artificial Intelligence for Health (2 anni, accesso libero, lingua inglese) forma laureati con competenze integrate in biotecnologie della salute e intelligenza artificiale. Il percorso copre sistemi biologici complessi, bioingegneria, AI applicata, fisiopatologia, sensorialità e gestione dei big data biologici. Si articola in due curricula: Biology (bioingegneria e informatica) e Engineering (biologia e biotecnologia).", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biotechnologies-and-applied-artificial-intelligence-for-health-wbhr-lm/#piano-di-studi"}, {"nome": "Biotecnologie Molecolari", "tipo": "magistrale", "descrizione": "Biologia molecolare e cellulare (2 anni, accesso libero, lingua italiana) forma laureati con solide competenze metodologiche e culturali in biologia moderna. Il percorso approfondisce basi molecolari e cellulari dei sistemi biologici, metabolismo, interazioni e segnali biochimici, e fornisce formazione avanzata in biochimica, genetica, microbiologia, tecnologie cellulari e DNA ricombinante. Comprende anche bioinformatica, matematica-statistica e conoscenze su normative bioetiche.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/biotecnologie-molecolari-wbor-lm/#piano-di-studi"}, {"nome": "Chimica", "tipo": "magistrale", "descrizione": "Chimica (2 anni, accesso libero, lingua italiana) forma laureati con solida preparazione nei principali settori della chimica e padronanza del metodo scientifico. Il corso sviluppa competenze in chimica analitica, fisica, inorganica e organica, supportate da conoscenze matematiche e informatiche. La didattica comprende lezioni, esercitazioni, laboratori e tirocini in aziende o enti pubblici. Il percorso si conclude con una tesi sperimentale originale, svolta in laboratorio universitario o presso strutture esterne.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/chimica-wchr-lm/#piano-di-studi"}, {"nome": "Chimica Industriale", "tipo": "magistrale", "descrizione": "Chimica Industriale (2 anni, accesso libero) offre una formazione avanzata in chimica industriale e tecnologie dei materiali, con attenzione a sostenibilità e uso di risorse rinnovabili. Il corso è strutturato in due curricula: Industriale, focalizzato su prodotti, processi e impianti chimici, e Materiali, dedicato ai materiali e alle loro applicazioni. La didattica combina lezioni, esercitazioni e laboratori, e si conclude con un progetto di ricerca che costituisce la tesi finale.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/chimica-industriale-wcir-lm/#piano-di-studi"}, {"nome": "Conservazione ed Evoluzione", "tipo": "magistrale", "descrizione": "Conservazione ed evoluzione (2 anni, accesso libero) offre un percorso interdisciplinare focalizzato sulla conservazione e l’evoluzione degli organismi nel contesto della storia naturale della Terra. Il corso integra biologia molecolare, gestione ambientale, paleontologia e geologia, e include lezioni, esercitazioni, laboratori e attività sul campo per sviluppare competenze teoriche e pratiche nell’analisi della diversità biologica e dei processi adattativi.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/conservazione-ed-evoluzione-wcer-lm/#piano-di-studi"}, {"nome": "Data Science and Business Informatics", "tipo": "magistrale", "descrizione": "Data Science and Business Informatics (2 anni, accesso libero, in inglese) forma professionisti con competenze avanzate in data science e conoscenza dei processi aziendali. Il percorso integra informatica e analisi dei dati, economia e management, e fondamenti matematico-statistici, prevedendo lezioni, laboratori, progetti pratici e stage per applicare le metodologie in contesti reali.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/data-science-and-business- informatics-wdb-lm/#piano-di-studi"}, {"nome": "Exploration and Applied Geophysics", "tipo": "magistrale", "descrizione": "Exploration and Applied Geophysics (2 anni, accesso libero,in inglese) forma geofisici capaci di affrontare problemi di esplorazione, caratterizzazione del sottosuolo e monitoraggio sismico anche in ottica ingegneristica. Il corso, sviluppato in collaborazione con il Politecnico di Milano, si articola in tre curricula: Exploration Geophysics (esplorazione risorse e monitoraggio CCUS), Applied Geophysics (monitoraggio ambientale e indagini ingegneristiche), e Earthquakes and Volcano Physics (studio di terremoti ed eruzioni vulcaniche).", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/exploration-and-applied-geophysics-wagr-lm/#piano-di-studi"}, {"nome": "Fisica", "tipo": "magistrale", "descrizione": "Fisica (2 anni, accesso libero, lingua italiana, sede Pisa) forma laureati con una solida preparazione culturale in diversi ambiti della fisica, padronanza del metodo scientifico e conoscenze avanzate in analisi dei dati, matematica e informatica. Il corso si articola in sei curricula: Fisica teorica, Fisica della materia, Fisica medica, Fisica delle interazioni fondamentali, Astronomia e astrofisica e Generale, ciascuno con piani di studio specifici, ad esempio: Astronomy and Astrophysics (metodi d’indagine astrofisica e spaziale), Complex Systems (analisi dei sistemi complessi), Data Analysis in Experimental Physics (analisi dei dati per la fisica sperimentale), e Fisica teorica (teorie quantistiche, fenomenologia delle interazioni fondamentali, gravità e fisica statistica).", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/fisica-wfir-lm/#piano-di-studi"}, {"nome": "Informatica", "tipo": "magistrale", "descrizione": "Informatica (2 anni, accesso libero, in inglese) offre una preparazione avanzata nei fondamenti scientifici dell’informatica e nelle tecnologie correlate. Forma professionisti capaci di contribuire al progresso della disciplina, sia negli aspetti teorici sia nelle applicazioni pratiche. Il corso si articola in quattro curricula: Artificial Intelligence, ICT Solution Architect, Foundations of Software e Big Data Technologies. Gli studenti", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/informatica-wif-lm/#piano-di-studi"}, {"nome": "Informatics for Digital Health", "tipo": "magistrale", "descrizione": "Informatics for Digital Health (2 anni, in inglese) forma professionisti in grado di progettare, analizzare e sviluppare piattaforme digitali e applicazioni software per monitoraggio, diagnosi, cura, benessere e assistenza nell’ambito della salute. Il corso fornisce competenze interdisciplinari in informatica applicata alla salute, approfondendo sistemi informativi sanitari, telemedicina, analisi dei dati sanitari tramite intelligenza artificiale, sicurezza dei dati, salute mobile e progettazione di nuovi farmaci. Il percorso include laboratori, progetti e stage in aziende e strutture sanitarie per applicare le conoscenze in contesti reali.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/informatics-for-digital-health-wdh-lm/#piano-di-studi"}, {"nome": "Matematica", "tipo": "magistrale", "descrizione": "Matematica (2 anni, in inglese e italiano) offre una formazione avanzata, teorica e applicata, per laureati triennali in matematica. Il corso integra didattica e ricerca di alto livello internazionale e si articola in cinque indirizzi: applicativo, didattico, generale, modellistico e teorico. Gli studenti approfondiscono algebra, geometria, analisi matematica, probabilità, fisica matematica, analisi numerica e altri ambiti specialistici, con possibilità di scegliere corsi avanzati in logica, storia della matematica e ricerca operativa. Sono previsti accordi internazionali per il conseguimento di una doppia laurea.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/matematica-wmar-lm/#piano-di-studi"}, {"nome": "Neuroscienze", "tipo": "magistrale", "descrizione": "Neuroscienze (2 anni, in inglese) forma laureati e laureate capaci di comprendere e studiare sperimentalmente il sistema nervoso, dai livelli molecolare e cellulare fino alla circuiteria integrata, sia in condizioni fisiologiche sia patologiche. Il corso è aperto a studenti con background diversi, purché abbiano una solida formazione di base. Prevede un percorso interdisciplinare con approfondimenti su morfologia, sviluppo e funzionamento del sistema nervoso, biochimica e genetica delle patologie neurali, metodologie sperimentali e statistiche. Le attività includono lezioni frontali, esercitazioni e laboratori.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/neuroscience-wncr-lm/#piano-di-studi"}, {"nome": "Scienze dell'Ambiente e del Clima", "tipo": "magistrale", "descrizione": "Scienze ambientali (2 anni, lingua italiana) forma laureati e laureate nella gestione, ripristino e valutazione dell’ambiente modificato dall’uomo, con competenze tecnico-scientifiche ed economiche. Il corso prevede due curricula: Monitoraggio e risanamento ambientale, per le tecniche di monitoraggio e risanamento, e Climatologico, per l’analisi dei cambiamenti climatici e la gestione dei dati climatologici. Gli studenti acquisiscono competenze nella protezione delle risorse naturali, nella gestione sostenibile e nella mitigazione e adattamento ai cambiamenti climatici.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-dell-ambiente-e-del-clima-wac-lm/#piano-di-studi"}, {"nome": "Scienze e Tecnologie Geologiche", "tipo": "magistrale", "descrizione": "Scienze e tecnologie geologiche (2 anni, lingua italiana, sede Pisa) forma laureati e laureate in grado di gestire in modo sostenibile gli aspetti geologici del territorio e di condurre ricerca applicata. Il corso prevede lezioni, laboratori ed esercitazioni sul campo, e comprende quattro curricula: Geologia strutturale, stratigrafica, sedimentologia e paleontologia; Geologia applicata, geografia fisica e geomorfologia; Georischi; Geochimica, mineralogia, petrologia, vulcanologia e georisorse. Gli studenti acquisiscono competenze per affrontare e risolvere problemi legati ai processi geologici, alla gestione del territorio e alle risorse naturali.", "url": "https://www.unipi.it/didattica/corsi/lauree-magistrali/scienze-e-tecnologie-geologiche-wger-lm/#piano-di-studi"}, {"nome": "Biotecnologie", "tipo": "triennale", "descrizione": "Biotecnologie  (3 anni, accesso programmato locale)\nIl corso fornisce una solida preparazione in ambito biologico, con focus su aspetti molecolari, cellulari e sistemici, applicabili in agricoltura, medicina, farmacia, industria e ambiente. Include lo studio di genomica di base e funzionale, tecniche bioinformatiche e attività sperimentali, con attenzione a normative, deontologia e bioetica. Gli studenti acquisiscono competenze per progettare e condurre attività di ricerca e sviluppare strumenti diagnostici e terapeutici per l’uomo.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/biotecnologie-btcr-l/#piano-di-studi"}, {"nome": "Chimica", "tipo": "triennale", "descrizione": "Chimica  (3 anni, accesso programmato locale)\nIl corso forma laureati con una solida preparazione in chimica, capaci di analizzare sostanze inorganiche e organiche, naturali o sintetiche, progettare nuove sintesi e sviluppare processi efficienti nel consumo di materie prime ed energia. Comprende basi di matematica e fisica, laboratori ed esercitazioni pratiche per sviluppare rigore scientifico e capacità di problem solving. Il diploma consente l’accesso alla laurea magistrale in Chimica o Chimica Industriale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/chimica-chir-l/#piano-di-studi"}, {"nome": "Chimica per l'Industria e l'Ambiente", "tipo": "triennale", "descrizione": "Chimica per l’industria e l’ambiente (3 anni, accesso programmato locale)\nIl corso forma chimici con solide competenze teoriche e pratiche, capaci di applicare la chimica e la chimica industriale all’industria, all’ambiente e allo sviluppo sostenibile. Gli studenti ricevono una preparazione di base in matematica, fisica e chimica, seguita da discipline applicative e tecnologiche, con laboratori ed esercitazioni pratiche. Il percorso include un tirocinio in laboratorio o azienda, concluso con la tesi finale.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/chimica-per-l-industria-e-l-ambiente-stcr-l/#piano-di-studi"}, {"nome": "Fisica", "tipo": "triennale", "descrizione": "Fisica (3 anni, accesso programmato locale)\nIl corso forma laureati con solide conoscenze di fisica classica e moderna, matematica, informatica e chimica, capaci di applicare il metodo scientifico. Gli studenti acquisiscono competenze in modellizzazione e analisi dei sistemi fisici, uso di strumenti di laboratorio, tecniche di acquisizione e elaborazione dei dati, metodi informatici e capacità di gestione della ricerca e dell’innovazione tecnologica. La didattica comprende lezioni, esercitazioni, laboratori e tirocini presso laboratori di ricerca o aziende, preparando al proseguimento con laurea magistrale e dottorato.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/fisica-fisr-l/#piano-di-studi"}, {"nome": "Geology", "tipo": "triennale", "descrizione": "Geology (3 anni, accesso libero,in inglese, Tashkent in Uzbekistan) \nIl corso forma professionisti con competenze in cartografia tematica, caratterizzazione di laboratorio dei geomateriali, ricerca di georisorse energetiche, minerarie e idriche, e protezione dai rischi geologici e ambientali. Le attività comprendono lezioni in aula, laboratori e lavoro sul terreno, per acquisire esperienza nella raccolta, analisi e sintesi dei dati geologici. Il percorso sviluppa solide basi teoriche e metodologiche, unendo conoscenze applicative a capacità di valutazione dei rischi e strategie di mitigazione.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/geology-glyr-l/#piano-di-studi"}, ": "Scienze geologiche (3 anni, accesso programmato locale)\nIl corso approfondisce i processi geologici che governano il sistema Terra, combinando studi teorici e sperimentali in laboratorio e sul campo. Gli studenti acquisiscono competenze per operare in autonomia, gestire, elaborare e comunicare dati geologici.\nLe attività didattiche comprendono lezioni in aula, laboratori con collezioni di minerali, rocce, fossili e carte geologiche, e escursioni interdisciplinari sul territorio.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-geologiche-geor-l/#piano-di-studi"}, {"nome": "Scienze Naturali e Ambientali", "tipo": "triennale", "descrizione": "Il corso di laurea in Scienze naturali e ambientali (3 anni, accesso programmato locale). Forma professionisti capaci di studiare, valorizzare e tutelare gli ecosistemi naturali e antropici. Il percorso si articola in tre curricula: Natura, Ambiente e Didattica, e combina discipline di scienze della vita e della terra con basi in matematica, fisica e chimica.", "url": "https://www.unipi.it/didattica/corsi/lauree-triennali-ciclo-unico/scienze-naturali-e-ambientali-natr-l/#piano-di-studi"}]}]};
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let curArea  = null;
let curLevel = null;

const TIPO_LABEL = { triennale:'Triennale', ciclo_unico:'Ciclo Unico', magistrale:'Magistrale' };
const TIPO_ICON  = { triennale:'🎒', ciclo_unico:'📜', magistrale:'🎓' };
const TIPO_ORDER = ['triennale','ciclo_unico','magistrale'];

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function haptic(t){ if(tg) tg.HapticFeedback.impactOccurred(t||'light'); }

/* ── GRID ── */
(function buildGrid(){
  const grid = document.getElementById('grid');
  DATA.aree.forEach(area => {
    const card = document.createElement('div');
    card.className = 'area-card';
    card.style.setProperty('--card-color', area.colore);
    card.innerHTML =
      '<img class="card-logo" src="'+esc(area.logo_statico)+'" alt="'+esc(area.nome)+'" loading="lazy">' +
      '<div class="card-label">'+esc(area.nome)+'</div>';
    card.addEventListener('click', () => openArea(area, card));
    grid.appendChild(card);
  });
})();

/* ── OPEN AREA ── */
function openArea(area, card){
  haptic('medium');
  curArea = area;

  // Prepara la schermata detail (in background)
  document.getElementById('hero-bg').style.background = area.colore;
  document.getElementById('hero-img').src = area.logo_statico;
  document.getElementById('detail-title').textContent = area.nome;
  const total = area.corsi.length;
  document.getElementById('detail-sub').textContent = total + ' corsi disponibili';

  // Level buttons
  const counts = {};
  area.corsi.forEach(c=>{ counts[c.tipo]=(counts[c.tipo]||0)+1; });
  const container = document.getElementById('level-btns');
  container.innerHTML = '';
  TIPO_ORDER.forEach(tipo=>{
    const n = counts[tipo]||0;
    if(!n) return;
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.innerHTML =
      '<div class="lv-icon" style="background:'+area.colore+'22;">'+TIPO_ICON[tipo]+'</div>'+
      '<div class="lv-text">'+
        '<div class="lv-name">'+TIPO_LABEL[tipo]+'</div>'+
        '<div class="lv-count">'+n+(n===1?' corso':' corsi')+'</div>'+
      '</div>'+
      '<div class="lv-arrow">›</div>';
    btn.addEventListener('click', ()=>openLevel(tipo));
    container.appendChild(btn);
  });

  // Pre-posiziona la detail screen dietro l'overlay (già in place, non animata)
  const detail = document.getElementById('screen-detail');
  instantClass(detail, 'behind');   // translateX(0) ma z-index 1, sotto l'overlay

  // Animazione espansione → poi video → poi rivela la detail
  expandAndPlay(area, card, () => {
    // Ora rendi la detail la schermata attiva e nascondi home
    const home = document.getElementById('screen-home');
    instantClass(detail, 'active');
    instantClass(home, null);  // torna a translateX(100%)
  });
}

/* ── Cambia classe istantaneamente (senza transition) ── */
function instantClass(el, cls) {
  el.style.transition = 'none';
  el.className = 'screen' + (cls ? ' ' + cls : '');
  el.offsetHeight; // reflow
  requestAnimationFrame(() => { el.style.transition = ''; });
}

/* ── EXPAND + VIDEO TRANSITION ── */
function expandAndPlay(area, card, callback){
  const overlay = document.getElementById('expand-overlay');
  const vid     = document.getElementById('exp-video');
  const rect    = card.getBoundingClientRect();

  // Posiziona overlay esattamente sopra la card (senza transition)
  overlay.style.cssText =
    'left:'          + rect.left   + 'px;' +
    'top:'           + rect.top    + 'px;' +
    'width:'         + rect.width  + 'px;' +
    'height:'        + rect.height + 'px;' +
    'border-radius:' + getComputedStyle(card).borderRadius + ';' +
    'background:'    + area.colore + ';' +
    'opacity:1;';

  vid.src = area.logo_video;
  vid.currentTime = 0;
  vid.classList.remove('visible');

  overlay.offsetHeight; // reflow

  // Espandi a schermo intero con transizione
  overlay.classList.add('expanding');
  requestAnimationFrame(() => {
    overlay.style.left         = '0px';
    overlay.style.top          = '0px';
    overlay.style.width        = '100vw';
    overlay.style.height       = '100vh';
    overlay.style.borderRadius = '0px';
  });

  // Dopo l'espansione → avvia video
  setTimeout(() => {
    overlay.style.background = '#000'; // letterbox bars = neri, non il colore area
    vid.classList.add('visible');
    vid.play().catch(() => finish());
  }, 420);

  function finish(){
    // 1. Prima cambia le schermate (istantaneamente, dietro l'overlay)
    //    Così quando l'overlay fa fade-out si rivela la detail, non la home
    callback();

    // 2. Poi fa il fade-out dell'overlay per rivelare la detail
    overlay.style.transition = 'opacity 0.28s ease';
    overlay.style.opacity    = '0';
    setTimeout(() => {
      overlay.classList.remove('expanding');
      overlay.style.cssText = '';
      vid.pause(); vid.src = '';
      vid.classList.remove('visible');
    }, 290);
  }

  vid.onended     = finish;
  overlay.onclick = finish;
}

/* ── HELPERS ── */
function parseDurata(desc){
  const m = desc && desc.match(/(\d+)\s+anni/i);
  return m ? m[1]+' anni' : null;
}
function parseAccesso(desc){
  if (!desc) return null;
  if (/accesso programmato nazionale/i.test(desc)) return 'prog. naz.';
  if (/accesso programmato/i.test(desc)) return 'accesso prog.';
  if (/accesso libero/i.test(desc)) return 'accesso libero';
  return null;
}

/* ── OPEN LEVEL ── */
function openLevel(tipo){
  haptic('light');
  curLevel = tipo;
  const area  = curArea;
  const corsi = area.corsi.filter(c=>c.tipo===tipo)
                  .sort((a,b)=>a.nome.localeCompare(b.nome));

  document.getElementById('courses-title').textContent =
    TIPO_LABEL[tipo]+' · '+area.nome.split(',')[0];

  const panel = document.getElementById('courses-list');
  // Colore accent chip
  const chipColor = area.colore;
  const chipBg    = area.colore + '33';

  panel.innerHTML = '<div class="section-label">'+
    corsi.length+(corsi.length===1?' corso':' corsi')+'</div>';

  corsi.forEach(c=>{
    const durata  = parseDurata(c.descrizione);
    const accesso = parseAccesso(c.descrizione);

    const chips = [
      durata  ? `<span class="cc-chip accent" style="--chip-color:${chipColor};--chip-bg:${chipBg};">⏱ ${durata}</span>` : '',
      accesso ? `<span class="cc-chip">${accesso}</span>` : '',
    ].filter(Boolean).join('');

    const card = document.createElement('div');
    card.className = 'course-card';
    card.innerHTML =
      `<div class="cc-accent" style="background:${chipColor};"></div>`+
      `<div class="cc-body">`+
        `<div class="cc-name">${esc(c.nome)}</div>`+
        (chips ? `<div class="cc-chips">${chips}</div>` : '')+
      `</div>`+
      `<div class="cc-arrow">›</div>`;
    card.addEventListener('click', ()=>openCourse(c));
    panel.appendChild(card);
  });

  goTo('screen-detail','screen-courses');
}

/* ── OPEN COURSE ── */
function openCourse(corso){
  haptic('light');
  const area = curArea;
  document.getElementById('course-topbar-title').textContent = TIPO_LABEL[corso.tipo];

  const badgeBg = { triennale:'#1a4a7a', ciclo_unico:'#5c3474', magistrale:'#7a5900' };
  const bg = badgeBg[corso.tipo] || area.colore;

  document.getElementById('course-panel').innerHTML =
    '<div class="cd-title">'+esc(corso.nome)+'</div>'+
    '<span class="cd-badge" style="background:'+bg+'33;color:'+bg+';">'+TIPO_LABEL[corso.tipo]+'</span>'+
    '<div class="cd-desc">'+esc(corso.descrizione||'Nessuna descrizione disponibile.')+'</div>'+
    (corso.url ? '<button class="btn-link" onclick="openExternal(\''+esc(corso.url)+'\')" style="background:'+area.colore+';">Vai al sito UniPi →</button>' : '');

  goTo('screen-courses','screen-course');
}

/* ── APRI LINK ESTERNO (browser, non bottom sheet Telegram) ── */
function openExternal(url){
  if(window.Telegram && Telegram.WebApp && Telegram.WebApp.openLink)
    Telegram.WebApp.openLink(url);
  else
    window.open(url, '_blank');
}

/* ── NAV ── */
function goTo(fromId, toId){
  const f = document.getElementById(fromId);
  const t = document.getElementById(toId);
  // from: scivola a sinistra
  f.className = 'screen exit-left';
  // to: entra da destra
  t.className = 'screen active';
  // Dopo la transizione: from sparisce istantaneamente a destra
  setTimeout(()=>{ instantClass(f, null); }, 370);
}

function goBack(fromId, toId){
  haptic('light');
  const f = document.getElementById(fromId);
  const t = document.getElementById(toId);
  // from: scivola via a destra
  f.className = 'screen going-right';
  // to: torna al centro (era a -28% come exit-left)
  t.className = 'screen active';
  // Cleanup
  setTimeout(()=>{ instantClass(f, null); }, 370);
}
</script>
